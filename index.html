            { setup: "Co dělá vlak, když má rýmu?", punchline: "Troubí místo houká.", tags: ["vlak","rýma"] },

            // === POLICIE ===
            { setup: "Policista volá na stanici: „Potřebujeme posily!\"\n„Proč?\"", punchline: "„Kávovar se pokazil.\"", tags: ["policie","káva"] },
            { setup: "Policista chytí zloděje: „Co jste ukradl?\"", punchline: "„Jenom chvíli vašeho času.\"", tags: ["policie","zloděj"] },
            { setup: "Policista ve škole: „Děti, co uděláte, když vidíte zloděje?\"", punchline: "„Napíšu to na Facebook.\"", tags: ["policie","škola","zloděj"] },
            { setup: "Policista v obchodě: „Pane, můžete popsat zloděje?\"", punchline: "„Ano, ukradl mi popis.\"", tags: ["policie","zloděj","obchod"] },
            { setup: "Policista na silnici: „Proč jste překročil rychlost?\"\nŘidič: „Jel jsem pomalu, pane.\"\n„Tachometr říkal 120.\"", punchline: "„Pardon, to byl vítr proti.\"", tags: ["policie","auto","rychlost"] },
            { setup: "Policista zastaví řidiče: „Váš řidičák, prosím.\"\n„Ale já ho nemám.\"\n„A proč řídíte?\"", punchline: "„Protože auto se samo nepohne.\"", tags: ["policie","auto","řidičák"] },

            // === VESMÍR ===
            { setup: "Proč je Mars červený?", punchline: "Stydí se.", tags: ["vesmír","mars","planeta"] },
            { setup: "Co dělá Měsíc, když ztratí stín?", punchline: "Čte si o zatmění.", tags: ["vesmír","měsíc"] },
            { setup: "„Tati, je na Měsíci život?\"", punchline: "„Jenom v knihách, synku.\"", tags: ["vesmír","měsíc","tatínek"] },
            { setup: "Proč je Země kulatá?", punchline: "Aby se slunce mělo kam schovat.", tags: ["vesmír","země","slunce"] },
            { setup: "Potkají se dvě hvězdy: „Kam padneš?\"", punchline: "„Asi na něčí přání.\"", tags: ["vesmír","hvězda","přání"] },
            { setup: "Co jedí astronauti?", punchline: "Vesmírnou stravu — planetky v omáčce z galaxie.", tags: ["vesmír","astronaut","jídlo"] },
            { setup: "Proč kometa má ocas?", punchline: "Aby se mohla vrátit po stopě.", tags: ["vesmír","kometa"] },
            { setup: "Jak se pozná astronaut na dovolené?", punchline: "Má pořád pocit, že je mu lehko.", tags: ["vesmír","astronaut","dovolená"] },

            // === ŘEMESLA ===
            { setup: "Malíř zákazníkovi: „Jakou máte rád barvu?\"\n„Modrou.\"\nMalíř nabarví bíle. „Proč bílá?\"", punchline: "„Protože modrá nebyla.\"", tags: ["malíř","barva"] },
            { setup: "Kadeřník zákazníkovi: „Jak to chcete ostříhat?\"\n„Jako kolegu vedle.\"", punchline: "„Tak to už si musím ostříhat sám sebe.\"", tags: ["kadeřník","vlasy"] },
            { setup: "Zámečník: „Potřebuji klíč.\"\n„Jaký?\"", punchline: "„Takový, co otevírá zámek. Proto jsem zámečník!\"", tags: ["zámečník","klíč"] },
            { setup: "Učitel v autoškole: „Vidíte babičku na přechodu. Co uděláte?\"\n„Brzdím.\"\n„Výborně. A pak?\"", punchline: "„Pomůžu jí přejít.\"", tags: ["autoškola","babička","přechod"] },
            { setup: "Zedník: „Ta stěna není rovně!\"\nArchitekt: „Na oko vypadá.\"", punchline: "„Tak zavřete oko!\"", tags: ["zedník","stěna","architekt"] },
            { setup: "Hasič: „Kdo zapnul klimatizaci?\"\n„Já.\"", punchline: "„Vypněte ji, ať nezamrzneme.\"", tags: ["hasič","klimatizace"] },
            { setup: "Zahradník: „Seděl jsem na trávě celý den.\"\n„A proč?\"", punchline: "„Chtěl jsem vidět, jak trávě roste.\"", tags: ["zahradník","tráva"] },
            { setup: "Zubař: „Proč jste přišel?\"\n„Otevřel jsem obálku s vaším účtem.\"", punchline: "„To jste měl přijít rovnou.\"", tags: ["zubař","účet"] },
            { setup: "Truhlář: „Kolik židlí jste si objednal?\"\n„Čtyři.\"\n„Proč čtyři?\"", punchline: "„Aby každá nohá mého stolu měla svou židli.\"", tags: ["truhlář","židle","stůl"] },
            { setup: "Instalatér: „Tady máte rozbité potrubí.\"\n„A kolik to bude?\"\n„5000.\"\n„Za co?!\"", punchline: "„Za vědění, kde klepnout.\"", tags: ["instalatér","potrubí","peníze"] },
            { setup: "Pekár: „Proč máte tak špatné koláče?\"\nUčeň: „Myslel jsem, že foukat znamená péct.\"", punchline: "", tags: ["pekař","koláč"] },

            // === OSTATNÍ / MIX ===
            { setup: "Proč se ryba směje?", punchline: "Protože si vzpomněla na ploutev-ek.", tags: ["ryba","smích"] },
            { setup: "Co dělá kamen v řece?", punchline: "Nic, celý den jenom leží a dívá se na ryby.", tags: ["řeka","kámen","ryba"] },
            { setup: "Proč kukačka kuká?", punchline: "Protože neumí říct „hele, kolik je hodin\".", tags: ["kukačka","hodiny","zvíře"] },
            { setup: "Co řekne pes, když mu majitel dá kost?", punchline: "Nic, je pes. Ale mává ocasem jako blázen.", tags: ["pes","kost"] },
            { setup: "Proč má žirafa skvrny?", punchline: "Aby se v lese neztratila — je dostatečně vysoká sama o sobě.", tags: ["žirafa","skvrny","les"] },
            { setup: "Co dělá sněhulák, když mu zmizne mrkev?", punchline: "Má špatný čich.", tags: ["sněhulák","mrkev"] },
            { setup: "Proč v divadle nehrají zvířata?", punchline: "Protože neumějí zpaměti texty.", tags: ["divadlo","zvíře"] },
            { setup: "Co dělá housenka v matematice?", punchline: "Počítá nohy.", tags: ["housenka","matematika"] },
            { setup: "Co dělá pavouk po jídle?", punchline: "Uklidí síť.", tags: ["pavouk","síť"] },
            { setup: "Proč se růže červená?", punchline: "Když vidí hnojivo.", tags: ["růže","květina"] },
            { setup: "Co je nejsmutnější ovoce?", punchline: "Slza — slivka, co se rozbrečela.", tags: ["ovoce","slivka"] },
            { setup: "Proč má kolo dva kola?", punchline: "S jedním by to byla jednokolka, a ta je cirkusová.", tags: ["kolo","cirkus"] },
            { setup: "Co dělá balón na obloze?", punchline: "Letí, dokud nespadne.", tags: ["balón","obloha"] },
            { setup: "Proč má tužka gumu?", punchline: "Protože lidé dělají chyby.", tags: ["tužka","guma","chyba"] },
            { setup: "Co říká lampa ve tmě?", punchline: "„Rozsviť mě, prosím!\"", tags: ["lampa","tma"] },
            { setup: "Proč telefon zvoní?", punchline: "Aby ti neuteklo, že s tebou někdo chce mluvit.", tags: ["telefon"] },
            { setup: "Co dělá chytrý telefon ve škole?", punchline: "Napovídá.", tags: ["telefon","škola"] },
            { setup: "Proč je banán ohnutý?", punchline: "Protože narovnaný by to byl meloun.", tags: ["banán","meloun"] },
            { setup: "Co dělá sekačka na trávu v zimě?", punchline: "Spí, a sní o trávě.", tags: ["sekačka","tráva","zima"] },
            { setup: "Proč je písek tvrdý pod vodou a měkký na pláži?", punchline: "Protože ve vodě je celou noc stísněný.", tags: ["písek","voda","pláž"] },
            { setup: "Co řekne písmeno A písmenu B?", punchline: "„Pojď, zahrajeme si slovní fotbal.\"", tags: ["písmeno","abeceda"] },
            { setup: "Proč televize nedokáže mlčet?", punchline: "Protože ji nikdo nevypnul.", tags: ["televize"] },
            { setup: "Co dělá deštník ve sprše?", punchline: "Pracuje přesčas.", tags: ["deštník","sprcha"] },
            { setup: "Proč se ručník usměje na mokré ruce?", punchline: "Ví, že bude mít práci.", tags: ["ručník","ruce"] },
            { setup: "Co dělá svíčka, když zhasne?", punchline: "Konečně si odpočine.", tags: ["svíčka"] },
            { setup: "Proč se židle nerada sedá?", punchline: "Celý den na ní sedí někdo jiný.", tags: ["židle"] },
            { setup: "Co řekne talíř lžíci?", punchline: "„Bez tebe by mě nikdo nevzal vážně.\"", tags: ["talíř","lžíce","jídlo"] },
            { setup: "Proč hodiny nemluví?", punchline: "Pořád jenom tikají.", tags: ["hodiny"] },
            { setup: "Co je nejlepší lék na bolení hlavy ze školy?", punchline: "Prázdniny.", tags: ["škola","hlava","prázdniny"] },
            { setup: "Proč mají prsty nehty?", punchline: "Aby bylo co žvýkat při testech.", tags: ["prsty","test","škola"] },
            { setup: "Co řekne vypínač žárovce?", punchline: "„Nerozsvěcuj se sama, to je moje práce.\"", tags: ["vypínač","žárovka"] },
            { setup: "Proč se voda nechce ohřívat rychle?", punchline: "Protože zná přísloví: „Kdo spěchá, vaří vodu dvakrát.\"", tags: ["voda","vaření"] },
            { setup: "Co dělá kaktus v dešti?", punchline: "Konečně se napije, ale tváří se, že to nepotřeboval.", tags: ["kaktus","déšť"] },

            // === ROZŠÍŘENÍ: scrape z czechtheworld.com (filtrováno pro 11leté) ===
            { setup: "Co to znamená, když v řadě třiceti netopýrů, visících hlavami dolů, sedí jeden s hlavou vzhůru?", punchline: "Omdlel!", tags: ["děti", "hádanka", "rodina", "zvíře"] },
            { setup: "Kdy přináší největší smůlu vidět černou kočku, jak vám přebíhá přes cestu?", punchline: "Když jste myš.", tags: ["děti", "myš", "rodina", "zvíře"] },
            { setup: "Rozmlouvají spolu dvě krávy na pastvě: „Slyšela jste už, že prý lev je král zvířat?“", punchline: "„Opravdu? A kolik nadojí?“", tags: ["děti", "kráva", "lev", "rodina", "zvíře"] },
            { setup: "V moři plavou dva žraloci a vidí windsurfaře.První: „Hele, svačina.“", punchline: "Druhý: „A dokonce na tácku s ubrouskem!“", tags: ["děti", "jídlo", "rodina", "zvíře"] },
            { setup: "Jaká tři slova má žralok nejraději?", punchline: "„Muž přes palubu!“", tags: ["děti", "lidi", "rodina", "ryba", "zvíře"] },
            { setup: "Když slon sedí na plotě, jaký je čas?", punchline: "Čas vyměnit plot.", tags: ["děti", "rodina", "slon", "sloní", "zvíře"] },
            { setup: "Proč šnek nemůže utíkat? \nProtože by mu vlály oči!", punchline: "", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Potkají se dva psi a jeden druhému říká: „Kam jdeš?“\n„S blechama k veterináři.“ \n„To je zvláštní, já je mám dva roky a ještě mi neonemocněly!“", punchline: "", tags: ["děti", "nemoc", "rodina", "zvíře"] },
            { setup: "Jsou dvě blechy na zastávce, běží kolem pes a jedna blecha říká: „Tak ahoj, jede mi autobus.“", punchline: "", tags: ["děti", "pes", "rodina", "zvíře"] },
            { setup: "Mladý pár přijede na chovatelskou stanici psů: „Jedeme vrátit toho psa, co jsme předvečerem koupili.“\n„A copak je s ním špatně?“ zajímal se chovatel.", punchline: "„No včera večer štěkal tak hlasitě, že jsme ani neslyšeli zloděje v kuchyni!“", tags: ["děti", "rodina", "zvíře"] },
            { setup: "„Haló, volám ohledně toho hlídacího psa, co jsme od vás koupili. Můžete nám poradit, jak to máme zařídit, aby nás pustil domů?“", punchline: "", tags: ["děti", "rodina", "zima", "zvíře"] },
            { setup: "Kouzelník pracuje na výletní lodi, a protože se obecenstvo při každé plavbě střídá, může triky opakovat. Ale má to jeden háček. Kapitán má mluvícího papouška, který všechny jeho triky už pochopil, vyrušuje a vždy obecenstvu vše poví. Například: „Pozor, má pod stolem schované květiny!“ Nebo: „Vidíte, to není ten samý klobouk!“ apod. Jednou se loď potopí, ale kouzelník a papoušek se zachrání na kusu dřeva. Oba dva mlčí a dívají se na sebe. Po třech dnech Papoušek prolomí ticho a povídá: „OK. Nemůžu na to přijít. Kam jsi tu loď schoval?!“", punchline: "", tags: ["děti", "kouzelník", "léto", "papoušek", "pták", "rodina", "zvíře"] },
            { setup: "Víte, proč nechodí stonožky lyžovat?", punchline: "Protože než by si nasadily lyže na všechny nohy, tak by bylo léto!", tags: ["děti", "léto", "rodina", "zvíře"] },
            { setup: "Letí vrabec kolem silnice. Nedívá se a napálí to do cyklisty. Ptáček leží a nehýbe se. Cyklista ho opatrně zvedne a vezme si ho domů. Koupí mu novou klec, dá mu tam vodu a chleba. Po dvou hodinách se ptáček probere a říká si: „Kde to jsem?", punchline: "Mříže, voda, chleba… Že já jsem toho chlápka zabil!“", tags: ["cesta", "děti", "jídlo", "pták", "rodina", "zvíře"] },
            { setup: "Všechna zvířátka z lesa se sešla na každoročním sněmu. V čele sněmu předsedá medvěd a povídá: „Sešlo se mi tu několik stížností na jedno zelené zvířátko, které nás svým kuňkáním každý večer obtěžuje. Jsem si jist, že nemusím přímo jmenovat ono zvířátko a jistě všichni uznáte, že s tím musíme něco udělat…“ Medvěd se odmlčí, ze zadní lavice vstane žabka a kuňkavým hlasem povídá: „Jasněěě, známeee, krokodýýýl, vyžeňte ho z lesaaa!!!“", punchline: "", tags: ["děti", "medvěd", "rodina", "zvíře"] },
            { setup: "Veverka na začátku zimy louská poslední oříšky, úplně hladová, konečně v teple svého stromu. Zmrzlýma prstama rozlouskne první a jediné, co z něj je, jsou přenádherné stříbrné šaty. Už celkem naštvaná, nervózní z hladu rozlouskne druhý – a jsou z něj ještě krásnější zlaté šaty. „Ale notáák!“ skučí a louská poslední oříšek. Naštvaně ho rozlouskne a vypadnou z něj saténové šaty pošité pravými diamanty. Veverka vyhodí všechny šaty dírou ve stromě, dívá se, jak padají, a naštvaně nadává: „Sakra, tak já už se kvůli tý pitomý pohádce nemůžu ani nažrat!“", punchline: "", tags: ["děti", "rodina", "strom", "veverka", "zima", "zvíře"] },
            { setup: "Plavou si takhle dva žraloci. Jeden je otec a učí svého syna lovit. Jsou u malé loďky a táta povídá „Hele, dělá se to takhle, obepluješ ho jednou. Chvilku počkáš a potom ho obepluješ po druhé. A potom ho ještě jednou naposled obepluješ a potom ho konečně můžeš sežrat.“ Žralokův syn nechápe, a tak se zeptá „A nemůžu ho jako sežrat hned?", punchline: "“ Táta žralok se znechuceně zatváří a povídá „Ty bys ho snad jedl i s bobkama?!“", tags: ["děti", "rodina", "ryba", "tatínek", "zima", "zvíře"] },
            { setup: "Medvěd jede se zajícem na motorce. Řídí medvěd a zeptá se zajíce: „Bojíš se?“\nZajíc: „Ne.“ \nŘídí zajíc a zeptá se medvěda: „Bojíš se?“\nMedvěd: „Ne.“\nZajíc: „Bát by ses měl.“\nMedvěd: „Proč?“", punchline: "Zajíc: „Protože nedosáhnu na brzdu.“", tags: ["děti", "medvěd", "rodina", "zajíc", "zvíře"] },
            { setup: "Malý komár se právě vrátil ze svého prvního letu a nadšeně vypravuje mamince: „Mami, to ti bylo prima, představ si, jak jsem tak letěl, všichni mi tleskali!“", punchline: "", tags: ["děti", "maminka", "rodina", "zvíře"] },
            { setup: "Přijedou manželé z dovolené a zjistí, že jim mluvící papoušek protelefonoval 10 tisíc. Za trest ho přibijí za křídla na zeď. Jak tak visí, dívá se na druhou stranu a tam visí Ježíš na kříži, a tak se ho zeptá: „Hej INRI, jak dlouho tu visíš?", punchline: "“ Ježíš zvedne hlavu a tichým hlasem odpoví: „Už víc jak 2000 let.“ Papoušek se vyděsí: „Kam jsi volal?!“", tags: ["děti", "papoušek", "pták", "rodina", "zvíře"] },
            { setup: "Letí tři netopýři a usadí se na stromě. Jeden odletí a za chvíli se vrátil a měl jeden zub od krve. A říká“ Vidíte támhle to stádo koní?", punchline: "Tak to jsem vysál.“ Odletí druhý vrátí se a má dva zuby od krve. A říká: „Vidíte támhle to stádo krav? Tak to jsem vysál.“ Odletí třetí a vrátí se s celou hlavou od krve a ti dva netopýři se ho ptají: „Tak co?“ A netopýr na to řekl: „Vidíte támhle ten sloup? Tak ten jsem neviděl.“", tags: ["děti", "kůň", "rodina", "strom", "zvíře"] },
            { setup: "Byl jednou jeden papoušek a ten mluvil velmi sprostě. Jeho pán už nevěděl, co s ním, tak ho dal na chvíli do mrazáku. Po chvíli ho šel zkontrolovat. A papoušek říká: Omlouvám se za svoje nevhodné chování. Mám jen jednu otázku: Co udělalo to kuře?", punchline: "", tags: ["děti", "lidi", "papoušek", "pták", "rodina", "zvíře"] },
            { setup: "Cvičí stará kočka a vždy, když něco udělá, křupne to v ní. Přijde k ní druhá kočka a říká jí: „Ty ji ale stará!“ Kočka přestane cvičit a říká: „Já nejsem stará, ale křupavá!“", punchline: "", tags: ["děti", "kočka", "rodina", "zvíře"] },
            { setup: "Povídají si dva koně a vidí běžet zebru. Jeden kůň na to:", punchline: "„Viděl si ho? To byl uprchlý vězeň!!!“", tags: ["děti", "kůň", "rodina", "zvíře"] },
            { setup: "Může klokan vyskočit výš než dům?", punchline: "Ano, dům přece neskáče!", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Kapr říká kaprovi: „Hele, Pepo, věříš na život po Vánocích?“", punchline: "", tags: ["děti", "rodina", "ryba", "vánoce", "zvíře"] },
            { setup: "Baví se dva pasáčci ovcí, jak velká mají stáda. První říká: „Já mám ve stádě 98 ovcí a ty?", punchline: "“ „Já nevím, pokaždé, když se je snažím spočítat, usnu!“", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Ve zvířecí škole moudrá sova nachytá mladou lišku, jak opisuje. „Vezmi si příklad třeba z krtka,“ říká podvodnici sova. „ Krtek ještě nikdy do cizího nenakoukl!“", punchline: "", tags: ["děti", "pták", "rodina", "zvíře"] },
            { setup: "Je to modré a skáče to ze stromu na strom, co to je?", punchline: "Veverka v montérkách.", tags: ["děti", "hádanka", "rodina", "strom", "veverka", "zvíře"] },
            { setup: "Baví se dva kapři: „Nevíš o něčem k snědku?“", punchline: "„Vím, ale má to háček!“", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Skupinka lvů pozoruje z dálky skupinu rytířů v brnění. Jeden lev si povzdechne: Ach jo, zase konzervy!!!", punchline: "", tags: ["děti", "lev", "rodina", "zvíře"] },
            { setup: "Slon s mravencem kráčeli pouští. Šli dlouho, předlouho, až slon upadl a pravil: „Asi umřu žízní.“", punchline: "Mravenec ho uklidnil: „Neboj se, nesu s sebou plnou bandasku vody.“", tags: ["děti", "rodina", "slon", "sloní", "zvíře"] },
            { setup: "Povídají si 2 kamarádi rybáři. První říká: Já jsem chytil tááákhle velkou rybu. Druhý rybář: Týjo to nic není já jsem chytil lampu a ještě svítila. No to není možný tvrdí první. Dobře ty zkrátíš tu rybu a já zhasnu tu lampu.", punchline: "", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Omlouvá se zajíc hadovi: „Promiň, že jsem se ti posmíval, že nemáš nohy.“\nHad: „Ale, to nic není!“", punchline: "Zajíc: „Tak, ruku na to!“", tags: ["děti", "had", "rodina", "zajíc", "zvíře"] },
            { setup: "Přijdou reportéři za slepicí a ptají se: „Je pravda že jste snesla sedmi kilové vejce?", punchline: "“ „No ano, je“ odpoví slepice. „A máte nějaké cíle do budoucna?“ ptají se dál. „Ano, snést deseti kilové vejce.“ Reportéři se jdou zeptat kohouta: „Víte, že jedna z vašich slepic snesla rekordní vejce?“ „No ano.“ Odpoví kohout. „A máte nějaké plány do budoucna?“ vyptávají se dál. „Ano, rozbít pštrosovi zobák!“", tags: ["děti", "jídlo", "rodina", "zvíře"] },
            { setup: "V lese žije strašný medvěd, a pokaždé, když vykonává potřebu v kadibudce, utře si „zadeček“ nějakým zvířetem. První den je to liška. Povídá vládci lesa, jelenovi: „Jelene, medvěd je strašný, můžeš s tím něco udělat?", punchline: "“ Druhý den přijde na řadu zajíc: „Jelene, mě už to nebaví!“ Třetí den je budka celá rozdupaná, zničená a polámaná. Jelen se ptá: „Neví o tom někdo něco?“ Ježek nato: „Já bych možná věděl.“", tags: ["děti", "ježek", "liška", "medvěd", "rodina", "zajíc", "zvíře"] },
            { setup: "Dítě velblouda se ptá maminky: „Mami proč máme tak dlouhé chlupy na nohách?“ \n„To aby se nám líp šlo po písku.“ \n„Mami proč máme dlouhé řasy nad očima?“ \n„Aby nám písek nelétal do očí.“", punchline: "„To je nám teda k ničemu, když jsme v ZOO.“", tags: ["děti", "maminka", "rodina", "zvíře"] },
            { setup: "Zebra a tučňák jdou k fotografovi. „Dneska prosím barevnou fotku, ne jako minule, když jste udělal černobílou!“ poprosí zebra.", punchline: "", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Pán v desátém patře zalévá květiny. V květináči vidí šneka. Vezme ho a vyhodí ho z okna. Po deseti letech uslyší pán, jak někdo zazvonil u jeho dveří. Pán otevře, ve dveřích stojí nasupený šnek a říká: „To si vypiješ!!!“", punchline: "", tags: ["děti", "lidi", "rodina", "zvíře"] },
            { setup: "Slepice povídá neposlušným dětem. „Kdyby to viděl Váš otec, tak by se na grilu obracel.“", punchline: "", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Přijde pán k veterináři a povídá: „Víte můj pes je jako já vášnivý fanoušek Sparty. A když Sparta prohraje, tak je mu strašně zle, zvrací, nic nežere…“ Veterinář:“ A co dělá, když Sparta vyhraje?", punchline: "“ Pán: „Já nevím, já ho mám teprve půl roku.“", tags: ["děti", "lidi", "pes", "rodina", "zvíře"] },
            { setup: "Dva lenochodi sedí nehybně na větvi stromu. Po třech dnech začne jeden pomalu otáčet hlavu a druhý mu říká: „Co stresuješ ?!“", punchline: "", tags: ["děti", "rodina", "strom", "zvíře"] },
            { setup: "Zvířátka v lese se dohodla, že si postaví sídliště. Do města na příslušné úřady půjde liška, ta je dost fikaná, všechna potřebná potvrzení a povolení rychle vyřídí, řekla si zvířátka. Za měsíc se liška vrátí s prázdnou. Tak se do města vydá medvěd, za měsíc ale taky přijde s prázdnou. Zvířátka už se smiřují s tím, že budou mít smůlu, když se ozve oslík: „Já bych to zkusil vyřídit!“ Ostatní zvířátka se začnou smát a říkají: „Ani liška se svým intelektem a ani silný medvěd to nedokázali vyřídit, tak ty už vůbec nemáš šanci. „Ale oslík se těmito řečmi nedal odradit a vydal se do města. Za tři dny zvířátka vidí oslíka, jak mává všemi potvrzeními a za ním jedou bagry, jeřáby a nákladní auta. Všichni se strašně diví: „Jak si to dokázal, oslíku?", punchline: "“ „To bylo snadné!“ říká osel, „přijdu na úřad, otevřu první dveře – spolužák, druhé dveře – spolužák, třetí dveře – spolužák…“", tags: ["děti", "liška", "medvěd", "rodina", "zvíře", "žák"] },
            { setup: "Ptá se malá myš maminky: „Co to vlastně je ten jed na myši?“\n„Víš, miláčku, to je něco jako kočka v prášku!“", punchline: "", tags: ["děti", "kočka", "maminka", "myš", "rodina", "zvíře"] },
            { setup: "Jeden muž říká druhému muži, že se mu ztratil kůň. Druhý mu na to říká: „No a co jsi udělal, Pepo?“\nPrvní muž: „Dal jsem inzerát do novin.“", punchline: "Druhý muž: „Tvůj kůň umí číst, jo?“", tags: ["děti", "kůň", "lidi", "rodina", "zvíře"] },
            { setup: "Povídá si žába s žábou. První žába: „Je mi špatně.“ A ta druhá: „Nepovídej, no jsi nějak zelená.“", punchline: "", tags: ["děti", "rodina", "zvíře", "žába"] },
            { setup: "Přijde jednou jedna holka na návštěvu ke kámošce a jak tak popíjejí kafe, přijde do obýváku černá kočka a říká: „Neviděly jste tady někde dnešní noviny?“", punchline: "Holka zmateně kouká, ale její kámoška ji uklidňuje: „Nenech se zmást, ona si akorát prohlíží obrázky.“", tags: ["děti", "kočka", "rodina", "zvíře"] },
            { setup: "„Tati je pravda, že mrkvička je zdravá na oči?", punchline: "“ Ptá se malý Honzík. „Jistě Honzíku, už jsi snad viděl králíka s brýlemi?“", tags: ["děti", "rodina", "zvíře"] },
            { setup: "Jdou zebra a žirafa k fotografovi. Fotograf se ptá: „Budete to chtít černobílé nebo barevné?“", punchline: "", tags: ["děti", "rodina", "zvíře", "žirafa"] },
            { setup: "Běží takhle pes po poušti a říká: „Jestli do minuty nenajdu patník, tak se asi počůrám.“", punchline: "", tags: ["děti", "pes", "rodina", "zvíře"] },
            { setup: "Je to zelený a točí se to furt dokola, co to je?", punchline: "Žába v mixéru.", tags: ["děti", "hádanka", "rodina", "zvíře", "žába"] },
            { setup: "Pepíček přijde domů. Tatínek se ho ptá: „Tak co bylo ve škole?", punchline: "“ „Já jsem se nejvíc hlásil.“ „A na co se paní učitelka ptala?“ „Kdo rozbil okno na chodbě.“", tags: ["děti", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "škola"] },
            { setup: "Pepíčku, proč vytahuješ ty rybičky z akvária?", punchline: "! Promiň, maminko, ale bál jsem se, že se utopí.", tags: ["děti", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček se ptá tatínka: „Tati, indiáni se malovali, když se chystali k boji, viď?“\n„Přesně tak,“ odpoví tatínek.", punchline: "„Tak si dej pozor na mámu. Je v koupelně a něco chystá,“ říká Pepíček.", tags: ["děti", "pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Pepíček je na návštěvě u prarodičů. Babička mu řekla: „Nastav dlaň, nasypu ti do ní oříšky.“\n„Dej je, babi, radši tátovi!“\n„Copak ty nemáš rád oříšky?“", punchline: "„Mám je rád, ale táta má větší dlaň!", tags: ["babička", "děti", "pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Paní učitelka se ptá při matematice Pepíčka: “Když ti dá maminka jednu žvýkačku a tatínek dvě, co budeš mít?”", punchline: "“Prosím, svěží dech.”", tags: ["děti", "maminka", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "škola"] },
            { setup: "Pepíček přijde do školy a všem se chlubí, že má jeho sestra žloutenku. Slyší to paní učitelka a pošle Pepíčka na týden domů, aby nikoho nenakazil. Když se po týdnu Pepíček vrátí, ptá se ho paní učitelka: „Tak co, Pepíčku, ještě má tvoje sestra žloutenku?", punchline: "“ Pepíček odpoví: „No to já nevím. Ono chvíli trvá, než ty dopisy z Austrálie přijdou.“", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "„Dobrý den paní učitelko, Pepíček nemůže přijít do školy je hrozně nemocný.“\n„V pořádku a kdo volá?“", punchline: "„Můj táta.“", tags: ["děti", "nemoc", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "škola"] },
            { setup: "Paní učitelka: Pepíčku, kde leží Zanzibar?", punchline: "Pepíček: Nevím, ještě jsem malý, abych znal všechny bary.", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "Pepíček se v noci vzbudí a vidí, jak z chodby odchází zloděj s plnými taškami. Potichu, aby nevzbudil rodiče, se Pepíček ke zloději připlíží, a šeptem ho poprosí: „Prosím vás, a nemohl byste ukrást taky moje housle?“", punchline: "", tags: ["děti", "pepíček", "rodina", "škola"] },
            { setup: "Paní učitelka se ptá třídy: „Proč stojí socha Svobody v newyorském přístavu, Pepíčku?“", punchline: "„Protože si nemůže sednout!“", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "Jede Pepíček s babičkou ve vlaku a povídá jí: „Babi, koukni se na tu množinu kraviček, co se pase na louce!“ „Co to kecáš, kluku, jaká množina kraviček?", punchline: "Vždyť tam žádné nejsou…“ „Ale to je prázdná množina, babičko…“", tags: ["babička", "děti", "pepíček", "rodina", "vlak", "škola"] },
            { setup: "Při přírodopisu:\nUčitelka: „Děti, každý z vás mi řekne jednu část neživé přírody. Začne Pepíček.“", punchline: "Pepíček: „Mrtvé moře!“", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "Ptá se máma Pepíčka: „Proč krmíš slepice čokoládou?“\nOn na to odpoví: „Aby mi snesly kindervajíčko!“", punchline: "", tags: ["děti", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "Ve škole se ptá paní učitelka: „Pepíčku, jak poznáš třešeň od jabloně?“\n„Podle plodů.“\n„Dobře, a když plody ještě nemají?“", punchline: "A Pepíček: „Počkám.“", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "„Pepíčku, proč jsi snědl ty peníze, co jsem ti dal?“", punchline: "„Vždyť jsi mi je dal na oběd.“", tags: ["děti", "jídlo", "peníze", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček je v parku a jezdí na kole. Volá na maminku: „Já jezdím bez ruuukkoouuu.“ Po chvilce volá znovu: „Mami, já jezdím bez žžžuuubbbůůů.“", punchline: "", tags: ["děti", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "„Pepíčku, učil ses vůbec?“\n„Ano.“\n„A proč máš v domácím úkolu tolik chyb?“", punchline: "„Protože chybami se člověk učí.“", tags: ["děti", "pepíček", "rodina", "úkol", "škola"] },
            { setup: "Učitelka učí děti zlomky: „Když sním polovinu dortu, co z toho budu mít?", punchline: "“ A na to Pepíček: „Bolest břicha.“", tags: ["děti", "nemoc", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "Pepíček přijde domů a řekne: „Mami, představ si, že jsem dostal tři jedničky.“\n„No to jsi šikovný!“", punchline: "„Ale máš si to jen představit!“", tags: ["děti", "jednička", "pepíček", "rodina", "číslo", "škola"] },
            { setup: "Pepíček přijde domů celý mokrý a maminka se ho ptá: ,,Co jsi tam venku dělal, že jsi tak mokrý?", punchline: "“ A Pepíček na to: ,,Ále, hráli jsme si s klukama na psy, a já byl strom.“", tags: ["děti", "maminka", "pepíček", "rodina", "strom", "škola"] },
            { setup: "Maminka: „Pepíčku, pojď se honem podívat, kuřátko začíná proklovávat skořápku. Vidíš?“\nPepíček: „Jo, vidím.“\nMaminka: „To je dobře, alespoň už od teď budeš vědět, jak se kuře dostane z vejce ven.“", punchline: "Pepíček: „To už vím dávno. Mne by spíš zajímalo, jak se dostalo dovnitř.“", tags: ["děti", "jídlo", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "„Tak co, Pepíčku, jaký je váš nový učitel?“\n„Hodný a zbožný, tati.“\n„Zbožný?“ „Ano. Při každé mé odpovědi jenom říkal: Pane bože, pane bože.“", punchline: "", tags: ["děti", "pepíček", "rodina", "učitel", "škola"] },
            { setup: "Pepíček přijde domů od zubaře a maminka se ho ptá jestli ho ten zoubek ještě bolí. Pepíček odpoví: „Já nevím, pan zubař si ho ještě nechal u sebe.“", punchline: "", tags: ["doktor", "děti", "lidi", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "Dědeček jde s Pepíčkem parkem a proti nim paní učitelka.\nPepíčku, schovej se, dnes jsi nebyl ve škole!", punchline: "Ne, dědo, ty se schovej, dneska jsi měl pohřeb…", tags: ["dědeček", "děti", "pepíček", "rodina", "učitel", "učitelka", "škola"] },
            { setup: "Na Vánoce: Pepíček přiběhne do kuchyně a křičí:\n„Maminko! Hoří stromeček!“\n„Neříká se hoří, ale svítí.“\nPepíček se vrátí do obýváku a za chvíli křičí: „Mamííí! Už svítí i záclona!“", punchline: "", tags: ["děti", "maminka", "pepíček", "rodina", "strom", "vánoce", "škola"] },
            { setup: "Pepíček se ptá maminky:\n„Mami, je pravda že když někdo umře, zůstane z něj jen prach?“\nMaminka odpoví:\n„Ano to je pravda Pepíčku.“\nPepíček řekne:", punchline: "„Tak to mi někdo umřel pod postelí!“", tags: ["děti", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček prosí tátu:\n„Tati, kup mi buben.“ \n„Nekoupím, budeš mě rušit při práci.“", punchline: "Pepíček: „Neboj, budu bubnovat jenom, když budeš spát.“", tags: ["děti", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček říká mamince, že ho bolí ucho. Maminka říká: „To bude zánět středního ucha.“ Pepíček řekne: „To teda nebude, já žádné střední ucho nemám, já mám jen pravé a levé!“", punchline: "", tags: ["děti", "maminka", "pepíček", "rodina", "škola"] },
            { setup: "Pepíčku, co jsi měl na vysvědčení?\nSamé…\nTy jsi ale šikovný!", punchline: "… pětky", tags: ["děti", "matematika", "pepíček", "pětka", "rodina", "vysvědčení", "škola"] },
            { setup: "Pepíčku, jak zní rozkazovací způsob slovesa mlčet?", punchline: "– Psssst!", tags: ["děti", "pepíček", "rodina", "škola"] },
            { setup: "Přijde malý Pepíček domů z fotbalu a povídá:\n„Tati, dal jsem dva góly!!!“\n„A jak to dopadlo?“", punchline: "„1:1“", tags: ["děti", "fotbal", "pepíček", "rodina", "škola"] },
            { setup: "Hurvínek šel na očkování, a křičí přes celou ordinaci. \nSpejbl ho uklidňuje: „Hurvajs, nekřič, vždyť ani nevíš proti čemu tě očkují.“", punchline: "„Vím. Proti mé vůli!“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Pan Spejbl vezme Hurvínka poprvé do opery. Když dirigent pozvedve taktovku, ptá se Hurvínek: „Proč ten pán vyhrožuje té paní na jevišti?“  „On ji nevyhrožuje.“", punchline: "„Tak proč ta paní řve?“", tags: ["děti", "hurvínek", "lidi", "mánička", "rodina", "spejbl"] },
            { setup: "„Máničko, dáš mi dvě koruny?“\n„Nedám, mám jen jednu.“\n„Tak mi dej jednu, budeš mi jednu dlužit a já ti budu taky dlužit. Takže si budem kvit!“", punchline: "", tags: ["děti", "hurvínek", "mánička", "peníze", "rodina", "spejbl"] },
            { setup: "„Hurvajs, proč otevíráš olejovky před akváriem?", punchline: "“ Ptá se Spejbl Hurvínka. „Aby rybičky viděly, jak dopadnou, když budou zlobit.“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "„Taťuldo, dej mi 5 korun.\n„Nedám, Hurvínku.“\n„Když mi dáš 5 korun, tak ti řeknu, co říká každé ráno pošťák paní Kateřině.“\n„Tady máš, co říká?“", punchline: "„Dobrý den, tady je vaše pošta.“", tags: ["děti", "hurvínek", "mánička", "peníze", "rodina", "spejbl"] },
            { setup: "Hurvínek z Máničkou jsou v kině. Hurvínek: „Máničko sedí se ti dobře?“ \n„Ano!“ \nHurvínek: „Vidíš dobře?“ \n„Ano!“", punchline: "„Tak si to pojď se mnou vyměnit!“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Učitel zadává úkol: Doma vypracujete cvičení 8, 9 a 10. Hurvínek si povzdechne: Chudák taťulda.", punchline: "", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl", "tatínek", "učitel", "úkol"] },
            { setup: "Policista k panu Spejblovi: „Pane řidiči, nesvítí vám světla, tak si vystupte.“ „To už jsem zkusil, ale nepomohlo to,“ ujišťuje ho pan Spejbl.", punchline: "", tags: ["auto", "děti", "hurvínek", "lidi", "mánička", "policie", "rodina", "spejbl"] },
            { setup: "„Ti dospělí jsou ale komičtí,“ rozčiluje se Hurvínek.", punchline: "", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "„Když zlobím, dostanu vynadáno, a když jsem hodný, tak mi měří teplotu.“", punchline: "", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "„Tady čtu, Hurvínku, že v případě požáru mám volat 150,“ diví se Spejbl. „A co je na tom divného, taťuldo?“", punchline: "„Za mého mládí jsme vždycky volali HOŘÍ, HOŘÍ!“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "„Hurvínku, v levé kapse máš dvacet korun a v pravé šedesát. Co máš?", punchline: "“  „Cizí kalhoty, pane učiteli.“", tags: ["děti", "hurvínek", "mánička", "peníze", "rodina", "spejbl", "učitel"] },
            { setup: "„Hurvínku, ty bys mohl být ten nejhodnější chlapec na světě, kdybys chtěl.“", punchline: "„Já vím, ale mě do toho vždycky něco vleze…“", tags: ["děti", "hurvínek", "lidi", "mánička", "rodina", "spejbl"] },
            { setup: "„Kde jsi byl, Hurvínku?“ \n„U Máničky.“ \n…A nepřišel jsi tam nevhod?“ \n„Naopak taťulínku. Když jsem vstoupil, tak paní Kateřina zvolala:,,No, ty jsi nám tu chyběl!“", punchline: "", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Hurvínek přibíhá pozdě do školy. Na chodbě se srazí s učitelem. „Deset minut zpoždění,“ oznámí přísně učitel.", punchline: "Já taky,“ rozzáří se Hurvínek.", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl", "učitel"] },
            { setup: "Při návštěvě zoo, volá ustrašený pan Spejbl na Hurvínka: „Okamžitě odejdi od toho lva!“ Hurvínek se diví: „A proč?", punchline: "Vždyť já mu nic neudělám.“", tags: ["děti", "hurvínek", "lev", "lidi", "mánička", "rodina", "spejbl"] },
            { setup: "Hurvínku skloňuj slovo chodit, říká Spejbl. \nChodím……chodíš…….chodí, říká pomalu Hurvínek. \nRychleji Hurvajs!", punchline: "Běžím…..běžíš…..běží, sype ze sebe Hurvínek.", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Hurvínek se vychloubá Spejblovi: „A taťuldo, dneska jsem se jako jediný ve třídě hlásil!“\nSpejbl: „No to je skvělé a na co se paní učitelka ptala?“", punchline: "Hurvínek: „Kdo nemá domácí úkol.“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl", "učitel", "učitelka", "úkol"] },
            { setup: "Hurvínku, to od tebe nebylo hezké. Mánička upekla bábovku a ty jí za to rozbiješ okno kamenem. To nebyl kámen taťulínku, brání se Hurvínek, to byla ta bábovka.", punchline: "", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Paní učitelko, proč se mým zubům říká mléčné?", punchline: "Protože piješ hodně mléka. Hurvínek se rozzáří. Takže taťulda má pivní zuby.", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl", "tatínek", "učitel", "učitelka"] },
            { setup: "„Hurvínku, co máš z housky, když ji rozdělíš?“\nHurvínek: „Dvě půlky.“\n„Dobře, a co když ty dvě půlky rozdělíš?“\nHurvínek: „Tak mám čtyři čtvrtky.“\n„Dobře, a co máš, když ty čtyři čtvrtky rozdělíš?“", punchline: "„No přece strouhanku!“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Hurvínek: „Co ti na Hurvínkovi tak vadí, Máničko?“ vyzvídá paní Kateřina. \n„Kouše si nehty.“ \n„No to sice není nic hezkého, ale na druhou stranu, nehty si přeci kouše spousta lidí.“", punchline: "„Ale ne na nohou.“", tags: ["děti", "hurvínek", "mánička", "rodina", "spejbl"] },
            { setup: "Proč je pizza tak smutná?\nProtože se jí všichni rozdělují!", punchline: "", tags: ["děti", "jídlo", "rodina"] },
            { setup: "K čemu jsou dobré létající talíře?", punchline: "Nemusí se nosit na stůl.", tags: ["děti", "jídlo", "rodina"] },
            { setup: "Jak se jmenuje Voldemortův přívrženec, který se zahubil přejídáním?", punchline: "KSMRTIJED", tags: ["děti", "jídlo", "rodina"] },
            { setup: "Na trhu: Zákazník: „Prosím vás, je ta mrkev geneticky upravovaná?“", punchline: "Mrkev: „Proč se ptáte?“", tags: ["děti", "jídlo", "rodina"] },
            { setup: "Maminka: „Pepíčku , když Kačenka dostane dostane 24 bonbónů a sní jich 17 , kolik bonbónů jí zůstane?“", punchline: "Pepíček: „24 . Protože kačenky nejí bonbóny.“", tags: ["děti", "jídlo", "maminka", "pepíček", "rodina"] },
            { setup: "Život je bonboniéra, tlustým lidem dlouho nevydrží.", punchline: "", tags: ["děti", "jídlo", "rodina"] },
            { setup: "Proč se pomeranč loupe?\nProtože nemá knoflíky, aby se rozepnul.", punchline: "", tags: ["děti", "jídlo", "rodina"] },
            { setup: "Ptá se učitelka Pepíčka: „Který pták je nejchytřejší?", punchline: "“ „Vlaštovka“ „Proč zrovna vlaštovka?“ „Protože v září, na začátku školního roku, odlétá.“", tags: ["děti", "pepíček", "pták", "rodina", "učitel", "učitelka"] },
            { setup: "Sedí Janička na posteli a pláče. Přijde k ní maminka a ptá se, co se stalo?\n„Škola nám shořela!“ vzlyká malá dívka.\n„Ale jdi ty, to se jen něco zdálo!“ povzbuzuje ji maminka.", punchline: "„No právě, béééé!“", tags: ["děti", "maminka", "rodina", "škola"] },
            { setup: "Pepíček se ptá paní učitelky: „Pančelko můžu dostat trest za něco, co jsem neudělal?“\n„Ne, Pepíčku.“", punchline: "„Tak to jsem neudělal domácí úkol.“", tags: ["děti", "pepíček", "rodina", "učitel", "učitelka", "úkol"] },
            { setup: "Při hodině zeměpisu: „Kde leží Kuba, Romane?”", punchline: "„V posteli, má hrozný kašel!”", tags: ["děti", "nemoc", "rodina", "zeměpis"] },
            { setup: "Pepíček přijde ze školy a maminka se ho ptá:\nCo jste se dneska naučili ve škole?\nA Pepíček povídá: Počítat do deseti, 1 2 3 4 6 7 8 9.\nA kde je ta pětka?", punchline: "No přece v notýsku!", tags: ["děti", "maminka", "matematika", "pepíček", "pětka", "rodina"] },
            { setup: "Přijde Pepíček domů a ukáže tátovi žákovskou. Tatínek vidí pětku z matiky, tak Pepíčkovi přiletí pohlavek, další vidí pětku z češtiny tak mu přiletí další pohlavek a poslední vidí jedničku z hudebky tak mu přiletí další pohlavek.\nPepíček: „A ten byl za co?“", punchline: "Tatínek: „Že Ti z těch dvou pětek bylo do zpěvu!“", tags: ["děti", "jednička", "matematika", "pepíček", "pětka", "rodina", "tatínek", "zima", "čeština", "číslo", "škola", "žák"] },
            { setup: "Tatínek prohlíží žákovskou knížku svého syna a ptá se:\n„Jak je to možné, že ze všech předmětů máš pětky a z dějepisu ne?“", punchline: "„Protože jsem z něj ještě nebyl zkoušený!“", tags: ["dějepis", "děti", "matematika", "pětka", "rodina", "tatínek", "škola", "žák"] },
            { setup: "Zlobí se Pepíček na dědečka: „Ty nejsi tatínek mého tatínka – paní učitelka říkala, že náš praotec se jmenuje Čech!“", punchline: "", tags: ["děti", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "čeština"] },
            { setup: "Ve škole: „Jak se nazývá savec, který nemá zuby?“", punchline: "„Dědeček.“", tags: ["dědeček", "děti", "rodina"] },
            { setup: "Učitelka se ptá žáčka: „Řekni mi zvířátko na P.“ „Potkan.“ „A teď na D.“ „Dva potkani.“ Učitelka zakroutí hlavou: „A na Ž?", punchline: "“ „Že by tři potkani…?“", tags: ["děti", "rodina", "učitel", "učitelka", "žák"] },
            { setup: "Paní učitelka dává dětem o matematice příklady.\n„Kolik je 7 + 6?“ \n„To je 13,“ odpoví Verunka.\n„Správně, a kolik je 9 + 3?“\n„No přeci 12,“ povídá Kuba.\n„A kolik je 1 + 1?“ zeptá se nakonec Pepíčka, který celou dobu mlčí.", punchline: "Pepíček, který do té doby nedával pozor, hned odpoví: „To je garsonka, paní učitelko!“", tags: ["děti", "matematika", "pepíček", "rodina", "učitel", "učitelka"] },
            { setup: "„Ty, Terezko, moc zlobíš! Vzpomeň si na Karkulku, co se jí stalo, když neposlouchala.“", punchline: "„A ty si, babi, vzpomeň, koho vlk sežral první…“", tags: ["babička", "děti", "pohádka", "rodina", "vlk"] },
            { setup: "Přiběhne Honzík k mamince a brečí. „Co se ti stalo?“\n„Tatínek se uhodil kladívkem do prstu.“\n„A ty proto pláčeš?“", punchline: "„No, já jsem se původně smál…“", tags: ["děti", "maminka", "rodina", "tatínek"] },
            { setup: "Letí dva balonky po poušti a jeden říká: „Pozor kaktussssssss!“", punchline: "„Kde ho vidíšššššššš?“", tags: ["děti", "rodina"] },
            { setup: "Matka napomíná syna: „Už mockrát jsem ti povídala, že se neříká co, ale prosím.“\n„Za několik minut přijde syn do kuchyně a ptá se: „Prosím děláš, mami?“", punchline: "", tags: ["děti", "rodina"] },
            { setup: "„Pane doktore, vždy když piju čaj nebo kávu, píchá mě pod levým okem.“ stěžuje si paní Nováková.", punchline: "„Tak si zkuste vyndat ze šálku lžičku.“", tags: ["doktor", "děti", "rodina"] },
            { setup: "Co se stane ze Sněhurky když spadne do ohně?", punchline: "Popelka.", tags: ["děti", "pohádka", "rodina"] },
            { setup: "Přijde pán k chlapečkovi a ptá se ho:\n„Nevíš, kde tady bydlí pan Novák?“\n„Vím, pojďte, já vám to ukážu.“\nKdyž vyjdou společně až do osmého patra, chlapeček ukáže na dveře a povídá: „No, tak tady bydlí ten pan Novák, ale jestli s ním chcete mluvit, tak sedí na lavičce před domem.“", punchline: "", tags: ["děti", "lidi", "rodina"] },
            { setup: "Pacient u lékaře: „Pane doktore, poslední dobou si nic nepamatuji.“\n„A od kdy to pozorujete?“", punchline: "„A co?“", tags: ["doktor", "děti", "rodina", "zima"] },
            { setup: "„Mami, nemáš náhodou deset korun pro starého a chudého pána?“\n„To je od tebe ale milé. A kdepak je?“", punchline: "„Stojí na rohu a prodává zmrzlinu.“", tags: ["děti", "peníze", "rodina"] },
            { setup: "Učitel k žákovi: „Kdybys měl sedm jablíček a já tě o dvě poprosil, kolik by ti jich zůstalo?“", punchline: "„Pořád sedm!“", tags: ["děti", "rodina", "učitel", "žák"] },
            { setup: "V hodině učitelka vykládá látku: „Děti, ví někdo z vás, co je to pštros?", punchline: "“ Ani jeden žák to neví, a tak vysvětluje: „Pštros je taková velká slepice, velká asi jako já.“", tags: ["děti", "hádanka", "rodina", "učitel", "učitelka", "žák"] },
            { setup: "Muž si nechá zavolat vrchního restaurace a říká mu: „Poslal jsem vám židli.“ „To jste hodný, ale to jste nemusel, my máme židlí dost…“ „To nic, plosím!“", punchline: "", tags: ["děti", "lidi", "rodina"] },
            { setup: "Čech přijde do čínské restaurace.\nČech: „Tak, co tu máte dobrého?“\nČíňan: „Hadí mozky, psí uši, kočičí ocasy…“\nČech: „Ježkovi voči, to je ale hnus!“", punchline: "Číňan: „Dobrá volba!“", tags: ["děti", "ježek", "rodina", "čeština"] },
            { setup: "Maminka se ptá staršího syna: Proč nechceš bráškovi půjčit sáňky?", punchline: "Syn odpoví: Já mu je půjčuju. On je má do kopce a já z kopce.", tags: ["maminka", "rodina"] },
            { setup: "Dědečku, máš ještě všechny zuby?", punchline: "Bohužel, Milánku, už nemám, posteskne si stařec. To je dobře, tak mi tady na chvíli prosím tě podrž čokoládu.", tags: ["rodina"] },
            { setup: "Holčička udiveně pozoruje maminku, jak si nanáší na obličej pleťovou masku. „Proč to děláš?“ vyzvídá. \n„Abych byla krásná“, odpoví maminka. \nPo chvíli si začne krém stírat.", punchline: "„Co se děje?“ nechápe holčička. „Vzdáváš to?", tags: ["maminka", "rodina"] },
            { setup: "Syn se ptá tatínka: „Tati, kdy si Indiáni malují obličeje?“ \n„Když se chystají do boje.“", punchline: "„Tak si dej pozor na mámu stojí před zrcadlem a maluje se!“", tags: ["tatínek"] },
            { setup: "Babička říká vnučce: „Když kašleš, dávej si ruku před pusu.“", punchline: "„Neboj babi, mě zuby nevypadnou.“", tags: ["babička", "rodina"] },
            { setup: "Několik dní po příjezdu z výměnného pobytu se ptá máma Vojty: „Proč nenapíšeš tomu svému novému kamarádovi z Číny? Copak na něj nemáš e-mail?“", punchline: "„Mám, ale tu adresu bych tam musel naskenovat.“", tags: ["maminka"] },
            { setup: "Malá Mařenka budí ve tři ráno otce: „Tatínku já chci vidět slonečky.“\n„Teď ne, Mařenko, víš, že teď se musí spinkat.“\n„Ale já chci vidět slonečky!“\n„Už jsem ti přece posledně říkal, že se to nesmí dělat.“\n„Ale já moc, moc chci! Když mě neukážeš slonečky, tak řeknu mamince, že jseš na mě zlej!“\n„No tak tedy dobře. Ale naposled, je ti to jasný!?“", punchline: "Otec jde k telefonu, vytočí číslo a povídá: „Dobrý den, tady plukovník Novák. Vyhlašte 3. rotě chemický poplach.", tags: ["maminka", "pohádka", "slon", "sloní", "tatínek", "zima"] },
            { setup: "„Maminko, co to nosíš v bříšku?“\n„Miminko.“\n„A máš ho ráda?“\n„To víš, že jo.“", punchline: "„Tak proč jsi ho snědla?“", tags: ["maminka"] },
            { setup: "Pepíček ve škole tyká paní učitelce, a tak dostane trest. Musí 100krát napsat větu „Nebudu tykat paní učitelce.“ \nNapíše to 200krát a paní učitelka se ho má ptá, proč to udělal. Pepíček jí na to povídá: „Já jsem ti chtěl udělat radost!“", punchline: "", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Malý Pepíček píše Ježíškovi: „Milý Ježíšku, celý rok jsem měl samé jedničky… Ne. To nemůžu napsat.“ A tak píše: „Milý Ježíšku, jelikož jsem byl celý rok hodný… Ne, to taky nemůžu napsat.“ Najednou ho něco napadne. Vyběhne z domu, vběhne do nedalekého kostela, tam vezme sochu Panny Marie, dá si ji do podpaží a běží s ní domů. Tam si sedne ke stolu a píše: „Milý Ježíšku, jestli chceš ještě někdy vidět svoji maminku…“", punchline: "", tags: ["jednička", "maminka", "pepíček", "číslo", "škola"] },
            { setup: "Pepíček dostane od tety krásné autíčko a maminka mu připomíná: „Co se říká?", punchline: "“ „Nevím!“ „Co říkám tatínkovi, když přinese výplatu?“ „Aha – neříkej, že to je všechno!“", tags: ["maminka", "pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Ve škole se paní učitelka ptá dětí: „Děti, když mám v jedné ruce 6 lahví vína a v druhé 8, co mám?", punchline: "“ Pepíček pohotově zareaguje: „Problém s pitím, paní učitelko!“", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Přijde Pepíček do lékárny a říká: „Máte něco proti bolesti?", punchline: "“ „A co tě bolí?“ „Ještě nic, ale táta si teď prohlíží moje vysvědčení.“", tags: ["nemoc", "pepíček", "tatínek", "vysvědčení", "škola"] },
            { setup: "Paní učitelka se ptá Pepíčka: „Co je to za zvíře – je hnědé a má čtyři nohy?", punchline: "“ „Pes.“ „No dobře, ale mohla by to být třeba i kočka. A řekni, jakého znáš hnědého ptáka“ „Orel!“ „Dobře, ale mohl by to být i jiný pták. Třeba takový vrabec, ten je taky dohněda.“ „A teď paní učitelko zase vy! Co je to, když se to strká dovnitř, je to tvrdé a suché a když to vyjde ven, tak je to měkké a vlhké…“ Učitelka se neudrží a vlepí Pepíčkovi facku. Pepíček na to: „No, to by taky mohlo být, ale jinak je to žvýkačka!“", tags: ["hádanka", "kočka", "pepíček", "pes", "pták", "učitel", "učitelka", "škola"] },
            { setup: "Přijde paní učitelka do třídy a ptá se: „Děti, kdo si myslí, že je hloupý, ať si stoupne.“ Všichni sedí, jenom Pepíček se postaví. Paní učitelka se ho ptá: „Pepíčku, ty si myslíš, že jsi hloupý?", punchline: "“ Pepíček: „To ne, ale je mi trapný vás nechat stát samotnou!“", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Přijde Pepíček domů a ukazuje tatínkovi vysvědčení. Tatínek povídá: „Tak hrozné vysvědčení jsem ještě neviděl!“ A Pepíček povídá: „Já také ne, ale včera jsem to našel ve tvých věcech…“", punchline: "", tags: ["pepíček", "rodina", "tatínek", "vysvědčení", "škola"] },
            { setup: "Jde kolem domu dědeček a vidí Pepíčka, který se snaží dosáhnout na zvonek. A tak se ho zeptá: „Nechceš, abych na ten zvonek zazvonil, chlapečku?", punchline: "“ Pepíček na to: „Tak jo.“ Dědeček zazvonil a Pepíček zakřičí: „A teď zdrháme dědo.“", tags: ["dědeček", "lidi", "pepíček", "rodina", "škola"] },
            { setup: "V hodině zpěvu vyvolá paní učitelka Pepíčka, aby vyjmenoval bicí nástroje. Pepíček odpoví: „Tak to je rákoska, vařečka a řemen!“", punchline: "", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Maminka jde s Pepíčkem poprvé do zoo. Od první chvíle, kdy tam vejdou, Pepíček nadšeně výská: „Jéé, opička, mamí, koukej, opička!“ „Ticho, Pepíčku, to je teprve paní pokladní!“", punchline: "", tags: ["maminka", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček přijde domů celý nadšený a chlubí se mamince: „Maminko, dnes jsme se ve škole učili o výbušninách!“ Maminka se ptá: „A co se budete ve škole učit zítra?", punchline: "“ Pepíček: „V jaké škole?“", tags: ["maminka", "pepíček", "rodina", "škola"] },
            { setup: "Pepíček se ptá: „Tatínku, kde má srdíčko nožičky?", punchline: "“ „Žádné nemá, samozřejmě.“ odpoví tatínek, „Jak jsi na to přišel?“ „Já jsem včera slyšel, jak říkáš: Srdíčko, roztáhni nožičky!“", tags: ["pepíček", "rodina", "tatínek", "škola"] },
            { setup: "„Mamí, upadl nám žebřík,“ říká Pepíček. \n„Tak to řekni tátovi!“", punchline: "„On už to ví, visí na okapu.“", tags: ["maminka", "pepíček", "škola"] },
            { setup: "Pepíčku, skloňuj slovo chléb.“ „Kdo, co?", punchline: "– Chléb.“ „S kým, s čím? – Se salámem.“", tags: ["pepíček", "škola"] },
            { setup: "Pepíček: „Můj táta je fakt strašpytel!“ Honzík: „Proč to?", punchline: "“ Pepíček: „Pokaždé, když není mamka doma, spí u sousedky.“", tags: ["pepíček", "tatínek", "škola"] },
            { setup: "„Pepíčku, proč jsi včera nebyl ve škole?", punchline: "“ „Vy jste říkala že kdo nebude mít domácí úkol tak ať se tady ani neukazuje.“", tags: ["pepíček", "úkol", "škola"] },
            { setup: "Paní učitelka se ptá Pepíčka: Jaký je čas „slíbuji, slibuje, slibujeme“?", punchline: "A Pepíček odpoví: Prosím, před volbami!", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "„Pepíčku, proč otevíráš olejovky před akváriem?", punchline: "“ Ptá se ho maminka. „Aby rybičky viděly, jak dopadnou, když budou zlobit.“", tags: ["maminka", "pepíček", "rodina", "škola"] },
            { setup: "Přijde malý Pepíček domů z fotbalu a povídá: „Tatíí dal jsem dva góly!“ „A jak to dopadlo?", punchline: "“ „1:1“", tags: ["fotbal", "pepíček", "tatínek", "škola"] },
            { setup: "Učitel zadává úkol: Doma vypracujete cvičení 8, 9 a 10. Pepíček si povzdechne: Chudák maminka.", punchline: "", tags: ["maminka", "pepíček", "rodina", "učitel", "úkol", "škola"] },
            { setup: "Pepíček byl první den ve škole. Další den ráno ho matka budí: „Pepíčku, vstávej, musíš jít do školy!“ – „Cože?", punchline: "Ještě jednou?“", tags: ["pepíček", "škola"] },
            { setup: "„Proč jsou ryby němé, Pepíčku?", punchline: "“ „Protože nejde mluvit s hlavou pod vodou.“", tags: ["pepíček", "ryba", "škola"] },
            { setup: "Oznamuje tatínek rodině: „Rodino, těšte se, letos o dovolené poletíme k moři… Proč brečíš, Pepíčku?", punchline: "“ „Já s vámi nemůžu, já ještě neumím létat.“", tags: ["pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Máma: „Pepíčku, proč si do bazénu bereš meloun?“ \nPepíček: „Ale mami, vždyť je vodní.“", punchline: "", tags: ["maminka", "pepíček", "škola"] },
            { setup: "„Tak cos dneska dělal ve škole, Pepíčku?“ \n„Já o tom nechci mluvit, mami. Večer to stejně uvidíš ve zprávách.“", punchline: "", tags: ["pepíček", "škola"] },
            { setup: "Paní učitelka napíše ve škole na tabuli příklad 2:2. \nPak se ptá dětí: „Jaký je výsledek?“", punchline: "Přihlásí se Pepíček a povídá: „Vyrovnaný zápas!“", tags: ["pepíček", "učitel", "učitelka", "zima", "škola"] },
            { setup: "Mami víš kolik pasty je v jedné tubě??\nNe Pepíku kolik???\nOd gauče až k tvýmu stolku ve vaší ložnici!!!!", punchline: "", tags: ["pepíček", "škola"] },
            { setup: "Pepíček nechce jíst. Matka ho přemlouvá: „Miláčku, budeme si hrát na tramvaj. Ty budeš tramvaj a lžička s polévkou nastupující lidé.“ Pepíček polyká lžičku za lžičkou. Když už je talíř skoro prázdný, volá: „Konečná, všichni vystupovat!“", punchline: "", tags: ["hra", "pepíček", "škola"] },
            { setup: "Učitelka v hodině matematiky: „Když máte na plotě pět ptáků a jednoho zastřelíte, kolik jich tam zůstane?", punchline: "“ Přihlásí se Pepíček: „Ani jeden. Ti ostatní se leknou a uletí.“ Učitelka přikývne: „Správná odpověď je čtyři, ale tvůj způsob uvažování se mi líbí.“ Pepíček na to: „Paní učitelko, a teď já vám dám jednu otázku. – Tři ženy sedí na lavičce a každá má zmrzlinu. První ji opatrně olizuje z boku, druhá ji cumlá zezhora až ke kornoutu a třetí jemně uhryzává od vršku. Která z nich je vdaná?“ Učitelka se začervená, ale pak odpoví: „Podle mě ta druhá, co si zmrzlinu dává celou do úst.“ Pepíček: „Správná odpověď je ta, která má prstýnek, ale Váš způsob uvažování se mi líbí.“", tags: ["matematika", "pepíček", "pták", "učitel", "učitelka", "škola"] },
            { setup: "Anička volá Pepíčkovi: „Pepíčku, přijď dneska večer k nám, nikdo nebude doma.“ Pepíček se navoní, učeše, obleče, přijde, zazvoní… A nikdo není doma.", punchline: "", tags: ["pepíček", "škola"] },
            { setup: "„Můžeš mi říct,“ zlobí se otec, „za co jsi dostal trojku z mravů?“\n„Kouřil jsem na záchodě,“ přiznává se Pepíček.\n„To mi nepovídej, za to jsem já dostal dvojku!“", punchline: "„No jo,“ brání se syn, „ale tys určitě nepozvracel učitelku…“", tags: ["pepíček", "učitel", "učitelka", "číslo", "škola"] },
            { setup: "Ve škole: „Pepíčku, kdo ti pomáhal s domácím úkolem?", punchline: "“ „Nikdo, paní učitelko.“ „Pepíčku, nelži! Kdo ti pomáhal s domácím úkolem?“ „Tatínek.“ „Tak mu vyřiď, že Wolker byl Jiří a ne Johnnie.“", tags: ["pepíček", "rodina", "tatínek", "učitel", "učitelka", "úkol", "škola"] },
            { setup: "Pepíček: „Tati, umíš psát potmě?“\nTáta: „Ano, proč?“\nPepíček: „Tak mi prosím podepiš žákovskou knížku.“", punchline: "", tags: ["pepíček", "tatínek", "škola", "žák"] },
            { setup: "Pepíček koupil babičce k narozeninám pěknou záchodovou štětku. Když k ní později přijel na návštěvu, nikde ji v koupelně neviděl. Tak se babičky zeptal: „Babičko, co se stalo s tou štětkou, co jsem ti dal k narozeninám?", punchline: "“ „Pepíčku, ona mi nevyhovovala. Za ta léta, co už jsem na světě, jsem si totiž zvykla na toaletní papír a tahle nová vymyšlenost strašně škrábala…“", tags: ["babička", "léto", "pepíček", "rodina", "škola"] },
            { setup: "„Pepíčku, řekni mi dvě zájmena.“\n„Kdo, já?“", punchline: "„Výborně, Pepíčku.“", tags: ["pepíček", "škola"] },
            { setup: "Pan učitel se ptá Pepíčka: „Když máš v jedné kapse 100kč a v druhé kapse 100kč, co máš?“", punchline: "„Cizí kalhoty,“ odpoví Pepíček.", tags: ["lidi", "pepíček", "učitel", "škola"] },
            { setup: "Pepíček volá radostně na tatínka:\n„Tati, já už umím psát!“\n„A co jsi napsal?“", punchline: "„To nevím, ještě neumím číst!“", tags: ["děti", "pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Při hodině vysvětluje paní učitelka dětem: Říkáme, že kráva se otelila, kočka okotila, známe nějaké další příklady?", punchline: "Přihlásí se Pepíček a říká: „Prosím Žralok se ožral!“", tags: ["kočka", "kráva", "pepíček", "ryba", "učitel", "učitelka", "škola"] },
            { setup: "Učitelka vyvolá Pepíčka, aby vyjmenoval čtyři živly. „Zima, voda, oheň a … hospoda!“ zní odpověď. „Proč hospoda?", punchline: "“ ptá se udiveně učitel. „Protože, když otec sedí v hospodě, tak maminka mu potom vždy říká, to si byl zase ve svém živlu!“ odpoví Pepíček.", tags: ["maminka", "pepíček", "rodina", "učitel", "učitelka", "zima", "škola"] },
            { setup: "„Pepíčku, pročpak jsi přišel pozdě do školy?", punchline: "“ „Protože jedna paní ztratila tisícikorunu.“ „A tys jí pomáhal hledat, viď?“ „Ne, stál jsem na bankovce a čekal, až odejde.“", tags: ["peníze", "pepíček", "zima", "škola"] },
            { setup: "„Mami, mami, mám dobrou a špatnou zprávu, jakou chceš slyšet první?", punchline: "“ ptá se Pepíček maminky. „Tak tu dobrou.“ „Dostal jsem jedničku z diktátu!“ „To je hezké, Pepíčku a jaká je ta špatná?“ „Že to není pravda!“", tags: ["jednička", "maminka", "pepíček", "číslo", "škola"] },
            { setup: "Paní učitelka se ptá dětí co dostaly o Vánocích pod stromeček. Vyvolá Pepíčka. Pepíček: Já jsem dostal PSP. Učitelka: To je ta nová hra, že?", punchline: "Pepíček: Ne to jsou ponožky slipy a punčocháče.", tags: ["hra", "pepíček", "strom", "učitel", "učitelka", "vánoce", "škola"] },
            { setup: "Učitelka se ve škole ptá: „Děti, řekněte mi věc, která se dává do pusy?", punchline: "“ Přihlásí se Janička: „Prosím, chleba s máslem.“ Přihlásí se Petřík: „Čokoláda a bombóny.“ Přihlásí se Pepíček: „Světlo!“ „Světlo…?“ diví se učitelka. „Včera večer jsem se učil a slyšel jsem z ložnice: Zhasni světlo a dej mi ho do pusy.“", tags: ["jídlo", "pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Nechci vás strašit pane učiteli, říká Pepíček pedagogovi, ale tatínek říkal, že jestli nezačnu nosit lepší známky, dostane někdo pěknej výprask.", punchline: "", tags: ["pepíček", "rodina", "tatínek", "učitel", "škola"] },
            { setup: "Přijde paní učitelka do třídy a ptá se dětí, jestlipak vědí, kdo včera umřel. Přihlásí se Pepíček a povídá: „Tomáš Marný.“ „Jak to víš, Pepíčku?", punchline: "Toho pána neznám.“ „Když jsem šel včera kolem ložnice našich, tak tatínek zrovna povídal mamince: Tomáš marný, ten už nevstane.“", tags: ["maminka", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "škola"] },
            { setup: "Přijde malý Pepík ze školy domů a povídá:\n„Dostal sem tři pětky.“\n„A z čeho?“ ptá se maminka.", punchline: "„Z ničeho nic.“", tags: ["maminka", "matematika", "pepíček", "pětka", "rodina", "škola"] },
            { setup: "Učitelka: „Děti, řekněte větu, co začíná slovem já.“\nPepíček: „Já je…“\nUčitelka: „Pepíčku, neříká se já je, ale já jsem.“", punchline: "Pepíček: „Já jsem zájmeno osobní.“", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Učitelka ve škole: „Pepíčku znáš nějakou pranostiku na únor?“\nPepíček se postaví: „Únor bílý, sílí pole.“\nUčitelka: „No sice je to dobře, ale zkus to říct tak, aby se to rýmovalo.“", punchline: "Pepíček: „Únor bílý, sílí pole, pičo, vole!“", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Jde tatínek s malým Pepíčkem na procházku a potkají cizího pána. Pepíček ho vzorně pozdraví, pán odpoví a když zajde, tak se tatínek zvědavě ptá: „Ty toho pána znáš?“\nPepíček odpoví: „Ano, to je pán z ochrany ovzduší.“\nTatínek se ptá: „A jak to víš?“", punchline: "Pepíček: „No, on k nám chodí, vždycky když nejsi doma a ptá se maminky, jestli je čistý vzduch.“", tags: ["lidi", "maminka", "pepíček", "rodina", "tatínek", "škola"] },
            { setup: "Děti ve škole dostali za úkol říkat přísloví a co z nich vyplývá. Toníček říká, že jeho tatínek pohádal se sousedem a vykopal před domem jámu, ale ráno, když spěchal do práce na ni zapomněl a spadl do ní. Z toho vyplývá, že kdo jinému jámu kopá, sám do ní padá. Mařenka na to, že, když přišla ze školy domů, babička pekla koláče a protože jí nepomohla, žádný nedostala a tedy z toho vyplývá, že bez práce nejsou koláče. Nakonec se přihlásí Pepíček a povídá: „Narodilo se nám miminko a včera, když jsem přišel domů, maminka mu dávala pít z prsu. Z toho vyplývá, že vlk se nažral a koza zůstala celá!“", punchline: "", tags: ["babička", "maminka", "pepíček", "pohádka", "rodina", "tatínek", "vlk", "úkol", "škola"] },
            { setup: "Tetička přijela k rodině na Vánoce. \nPřed spaním jí malý Pepíček říká: \n„Teto, nezapomeň se v pokoji pořádně zamknout! \n„A proč?“ ptá se tetička.", punchline: "„Protože tatínek říkal, že nám můžeš být ukradená.“", tags: ["pepíček", "rodina", "tatínek", "vánoce", "škola"] },
            { setup: "Ve škole probírají děti povolání svých tatínků.\nJaroušek říká: „Můj tatínek je pekař.“\nAnička: „Můj tatínek je ředitel.“\nVlastík: „Můj tatínek je doktor.“\nPřihlásí se Pepíček a smutně říká: „Můj tatínek je taxíkář.“\nPaní učitelka se zeptá: „A proč to říkáš tak smutně, Pepíčku, vždyť taxíkář je také užitečné zaměstnání.“", punchline: "Pepíček odpoví: „Když ona si maminka tenkrát zapomněla napsat číslo toho taxíku.“", tags: ["doktor", "maminka", "pepíček", "rodina", "tatínek", "učitel", "učitelka", "ředitel"] },
            { setup: "Povídá pan učitel Pepíčkovi: „Doufám, že tě už nikdy neuvidím opisovat.“ Pepíček na to: „Já taky doufám.“", punchline: "", tags: ["lidi", "pepíček", "pták", "učitel"] },
            { setup: "Dává paní učitelka dětem ve škole hádanku „děti myslím si lesní zvířátko, a když přidám písmeno D vyjde mi část lidského těla“ děti dlouho přemýšlí a nakonec se nechají podat „no děti je to přece laň a když přidám D vyjde mi dlaň“ v zadní lavici Pepíček dloubne souseda a říká „sem ti to hned říkal, že kuna to nebude.“", punchline: "", tags: ["pepíček", "učitel", "učitelka"] },
            { setup: "Jeden říká druhému: „Hele, víš jak jsme ti na střední škole schválně říkali místo Karle Nováku – Narle Kováku?", punchline: "“ „No vím a co s tím?“ „Ty vole, včera jsem potkal maníka a ten se jmenoval Lukáš Šustr.“", tags: [] },
            { setup: "V ředitelně zvoní telefon: „Prosím pěkně, pane řediteli, můžete dnes omluvit studenta Václavíčka?", punchline: "Leží a nemůže se ani hnout.“ „A kdo volá?“ ptá se ředitel. „Můj otec,“ ozve se nesměle na druhém konci drátů.", tags: ["ředitel"] },
            { setup: "Malý Pepíček jede se svojí babičkou vlakem na matematickou olympiádu. Cestou se dívá z okna a najednou prohlásí: ,,Babi, koukej, jaká je tam venku nádherná množina kraviček.“ Babička pohlédne z okna a praví: ,,Ale Pepíčku, vždyť na té louce nic není.“ A Pepíček říká: ,,Když ona je to prázdná množina.“", punchline: "", tags: ["babička", "pepíček", "rodina", "vlak"] },
            { setup: "Sedí takhle vyhladovělí studenti na koleji a fantazírujou: „Co takhle začít chovat prase?", punchline: "“ „Ti hrabe, ne? Co ta špína? A ten smrad?“ „Si zvykne…“", tags: ["prase"] },
            { setup: "Syn železničáře přijde poprvé ze školy, hodí tašku do kouta a povídá:\n„Pěkný podfuk! Prý první třída a mají tam tvrdý a dřevěný lavice!“", punchline: "", tags: ["škola"] },
            { setup: "Sedí matfyzák s matfyzačkou na lavičce a zamilovaně se k sobě tulí. Najednou kolem nich projede malý chlapeček na tříkolce. Matfyzačka se otočí na matfyzáka a říká mu: „Myslíš na to co já?", punchline: "“ A on: „Ano.“ A ona: „A kolik ti to vyšlo?“", tags: ["lidi"] },
            { setup: "V křesťanské škole se ptá učitelka dětí: „Tak děti, dám vám hádanku. Co je to?", punchline: "Skáče to po stromech a žere oříšky. Přihlásí se Lojzík: „Já myslím že veverka, ale jak vás znám tak to bude určitě Ježíš Kristus.“", tags: ["hádanka", "strom", "učitel", "učitelka", "veverka"] },
            { setup: "Syn na matku: “Mami… děti se mi ve škole smějí, že jsem ještě panic.” “Tak jim dej všem pětky a oni přestanou!”", punchline: "", tags: ["matematika", "pětka"] },
            { setup: "Nová učitelka zoologie se ptá žáka:\n„Chlapče, jak se jmenuje pták, od kterého je toto vejce?“\n„Nevím.“\n„A tohle?“\n„Nevím.“\n„A toto?“\n„Také nevím.“\n„Špatné, velmi špatné. Jak se jmenuješ?“\nŽák stáhne trenýrky a povídá:", punchline: "„Zkuste to uhádnout podle vajec!“", tags: ["jídlo", "lidi", "pták", "učitel", "učitelka", "žák"] },
            { setup: "„Vstávej synku, musíš do školy!“ „Maminko, já tam nechci, oni mě tam vůbec neberou, smějí se mi… Opravdu tam musím jít?", punchline: "“ „Musíš, musíš, vždyť jseš učitel.“", tags: ["maminka", "učitel"] },
            { setup: "„Pane učiteli, jak bude vypadat test?“\n„No… dostanete papíry a tam budou otázky.“", punchline: "", tags: ["učitel"] },
            { setup: "„Mami, dneska se mě ptala paní učitelka, jestli mám sourozence.“\n„A cos odpověděl?“\n„Že jsem jedináček.“\n„A co na to učitelka?“", punchline: "„CHVÁLABOHU!“", tags: ["učitel", "učitelka"] },
            { setup: "„Pane učiteli, jaký je váš názor na studentky, které si malují oči?", punchline: "“ Ale vcelku kladný. Ty děvuchy vůbec nebrečí, když dostanou špatnou známku.“", tags: ["učitel"] },
            { setup: "Přijde za paní učitelkou chlapec z třetí třídy a říká: „Paní učitelko, nechoďte prosím do lesa, sežerou vás tam.“\nUčitelka jen zakýve hlavou a nevšímá si ho.\nZa chvíli přijde chlapec znova a říká: „Paní učitelko, nechoďte prosím do lesa, sežerou vás tam.“\nUčitelka nevydrží a zeptá se: „A proč bych se jako měla bát?“\nChlapec odpovídá: „Protože jsem slyšel toho nového tělocvikáře s panem fyzikářem, jak si říkají, Pane kolego, tu novou kolegyni tak dostat do lesa, to by bylo žrádlo, co?“", punchline: "", tags: ["lidi", "učitel", "učitelka"] },
            { setup: "Poznámka: Svačí cibuli a obtěžuje zápachem.", punchline: "", tags: ["perlička", "škola"] },
            { setup: "Poznámka: Když jsem vašeho syna vyvolala k tabuli, opáčil mi: „Piš pět, svačím!“", punchline: "", tags: ["perlička", "škola"] },
            { setup: "Poznámka: Neustále lítá po třídě a posedává na oknech.", punchline: "Odpověd: Tomu nevěřím. Holub", tags: ["perlička", "pták", "škola"] },
            { setup: "Poznámka: O každé přestávce poskakuje z lavice na lavici a usmívá se.\nOdpověd: Tak jak je možné, že má dvojku z tělocviku?", punchline: "", tags: ["perlička", "číslo", "škola"] },
            { setup: "Jaká jsou nejčastější zranění při požáru základní školy?", punchline: "Popáleniny prvního a druhého stupně..", tags: ["perlička", "škola"] },
            { setup: "Učitel se ptá Ondry: „Proč jsou ryby němé, Ondro?“ \n„Protože nejde mluvit s hlavou pod vodou!“", punchline: "", tags: ["perlička", "ryba", "učitel", "škola"] },
            { setup: "V mateřské školce:\n„Jak dělá pejsek, Honzíku?“\n„Haf.“\n„Mařenko, jak dělá kočička?“\n„Mňau.“\n„Jiříčku, jak dělá žabička?“\n„Kvák.“\n„Tomáši, jak dělá myš?“", punchline: "„Klik, paní učitelko.“", tags: ["kočka", "myš", "perlička", "pes", "učitel", "učitelka", "škola"] },
            { setup: "Sousedka se ptá malého Toníka, který právě začal chodit do první třídy: „Co je tvůj nejoblíbenější předmět ve škole?", punchline: "“ „Asi zvonek, paní Nováková.“", tags: ["perlička", "škola"] },
            { setup: "On-line vyučování připomíná spirituální seanci.\nUčitelka se ptá: „Maruško, jsi tu s námi? Jestli nás slyšíš, odpověz!“", punchline: "", tags: ["učitel", "učitelka"] },
            { setup: "Při hodině; \n„Hej, Franto, sundej si ty sluchátka,“ píše Karel spolužákovi. \n„Proč, děje se něco?“ odepisuje Franta", punchline: "„Řve po tobě učitelka!“", tags: ["učitel", "učitelka", "žák"] },
            { setup: "„Blíží se období třídních schůzek. Jsem fakt zvědavá, jestli se učitelé přijdou zeptat, jak se dětem daří.“", punchline: "", tags: ["učitel"] },
            { setup: "Učitelka volá jednomu z rodičů. „Dobrý den, Váš syn neustále lže.“ Otec na to: „No, tak to je v tom fakt dobrej, protože já žádného syna nemám.“", punchline: "", tags: ["učitel", "učitelka"] },
            { setup: "Petříkův tatínek zaklepe u souseda: „Tak jakpak, sousede, už jste udělal synovi úkol z matematiky?", punchline: "“ „Ano.“ „A nedal byste mi ho, prosím, opsat?“", tags: ["matematika", "rodina", "tatínek", "úkol"] },
            { setup: "Táta říká dceři: „Jestli zítra dostaneš z té písemky horší známku než jedničku, zapomeň, že jsem tvůj otec.“ Druhý den se otec ptá: „Tak co jsi dostala z té písemky?", punchline: "“ Dcera po chvilce odpoví: „A ty jsi kdo?“", tags: ["jednička", "rodina", "tatínek", "číslo"] },
            { setup: "Matka telefonuje učitelce: „Prosím Vás, nedávejte dětem úkoly z matematiky, ve kterých stojí láhev piva 1,80 Kč. Manžel nemohl celou noc usnout!“", punchline: "", tags: ["matematika", "učitel", "úkol"] },
            { setup: "Matka: „Dokud nenapíše úkoly, nedostaneš večeři.“", punchline: "", tags: ["úkol"] },
            { setup: "Pepíček: „A co je k večeři?“", punchline: "", tags: ["pepíček"] },
            { setup: "Dva vysokoškoláci se baví: „Ty vole, když si uvědomím, jakej já jsem inženýr, tak mám normálně strach jít k doktorovi!“", punchline: "", tags: ["doktor"] },
            { setup: "„Slyšela jsem, že váš syn studuje na univerzitě. Co z něho bude, až skončí ?", punchline: "“, ptá se známá paní Novákové. „Obávám se, že důchodce.“", tags: [] },
            { setup: "Matfyzák na brigádě:\nHost: „Dobrý den, chtěl bych si u vás rezervovat stůl pro tři, na osmou.“ \nStudent: „Tři na osmou? Myslíte si, že tu máme stůl pro šest a půl tisíce lidí?“", punchline: "", tags: [] },
            { setup: "Oznámení na vrátnici internátu: Prosíme studenty, aby z okna nevyhazovali odpadky. Malé děti je sbírají a nafukují.", punchline: "", tags: [] },
            { setup: "Studentka medicíny předvádí na maketě porod kleštěmi. Doktor ji chvilku pozoruje a pak povídá: „No výborně, ještě těma kleštěma švihněte otce přes hlavu a vyvraždila jste kompletně celou rodinu.“", punchline: "", tags: ["doktor"] },
            { setup: "Vědci z Pekingu dělají výzkum za jak dlouho je student schopen naučit se čínsky. Přijedou do harvardské knihovny, předloží studentovi 10cm širokou knížku s čínskou gramatikou a zeptají se ho, za jak dlouho by se ji zvládl naučit. Student vzhlédne od skript, přejede knihu pohledem a povídá:\n„Za rok.“\nJedou tedy na Oxford, vyhledají nejlepšího studenta a položí mu tutéž otázku.\n„Bude to natěsno, ale ……za půl roku,“ zní odpověď.\nPak jedou do České republiky do Liberce na Technickou univerzitu. Tam sedí v menze student a lžící se znuděně rejpe v hrachové kaši.\n„Jak dlouho by Vám trvalo naučit se čínsky?“ ptají se vědci.\nStudent vzhlédne od stolu a ptá se: „A jsou na to nějaký skripta?“\n„Ano, tady“ a ukážou mu deseticentimetrový svazek.", punchline: "Student palcem projede hřbet stránek, zapíchne lžičku do kaše a povzdychne si: „Doprdele, to zas bude noc“ …", tags: ["zima"] },
            { setup: "Krásná studentka u profesora v kabinetu.\n„Věřte mi, jsem schopná udělat cokoliv proto, abych tuto zkoušku udělala. Mám na mysli všechno…“\nProfesor se k ní přikloní blíž. „Vážně všechno?“\nStudentka se mu zahledí zpříma do očí. „Ano, všechno…“", punchline: "„Tak skvělé, tak se to koukej naučit!“", tags: ["zima"] },
            { setup: "Včera jsem byl na zajímavé přednášce o kleptomanii. Musím říct, že jsem si z ní hodně odnesl.", punchline: "", tags: [] },
            { setup: "Studenti medicíny mají přednášku o rozmnožování.\nProfesor vykládá: „Kupříkladu takový býk zvládne tento akt i třicetkrát za den.“\nZ první řady se ozve studentka: „Třicetkrát?! Mohl byste to prosím zopakovat, aby to slyšeli i ti, kteří sedí vzadu?“\nPřednášející tedy zopakuje hlasitěji: „Býk zvládá tento akt i třicetkrát za den.“\nV poslední řadě se zvedne student: „Prosím Vás, a to ho připouštějí stále na tu stejnou samici?“\n„Ne, to samozřejmě ne, pokaždé na jinou“, odpoví profesor.", punchline: "„A mohl byste to zopakovat, aby to slyšely i studentky v první řadě?“", tags: ["kráva", "zima"] },
            { setup: "První den školního roku má děkan proslov k nováčkům. Seznamuje je také s kolejním řádem. Dívčí pokoje jsou pro studenty tabu a naopak. Kdo bude přistižen při porušení tohoto zákazu, zaplatí pokutu 500 Kč. Při druhém přestupku se pokuta zvyšuje na 2000 Kč, při třetím na 5000 Kč.\n„Jsou nějaké dotazy?“", punchline: "Z davu se ozve: „Kolik stojí permanentka?“", tags: [] },
            { setup: "Čtyři studenti se před zkouškou vydali na chatu na chlastačku. Samozřejmě přípravu na zkoušku podcenili. V pondělí ráno před zkouškou chtěli zachránit to, co se ještě dalo. Zavolali tedy profesorovi s omluvou, že u auta píchli kolo, mají defekt, a asi nestihnou zkoušku.\nProfesor, správný člověk, jim vyhověl a zkoušku o dva dny odložil.\nStudenti se na posunutý termín připravili vzorně.\nProfesor je rozsadil do 4 místností a rozdal jim zadání se dvěma otázkami. První, za 10 bodů, byla z učiva a byla jednoduchá. Druhá, za 90 bodů, zněla: Které kolo?", punchline: "", tags: [] },
            { setup: "Student dutý jak bambus, propadá u zkoušky z „logiky a organizace“.\nStudent: „Vy mě tady dusíte a rozumíte vůbec tomu oboru?“\nProfesor: „Jistě, jinak bych nebyl profesor!“\nStudent: „Mohu Vám tedy dát jednu otázku? Když mi na ni správně odpovíte, dejte mi nedostatečnou a já odejdu. Když ale nebudete znát odpověď, dáte mi za jedna.\nProfesor: „Souhlasím.“\nStudent: „Co je současně legální,ale nelogické, logické ale nelegální a co není ani logické ani legální?“\nProfesor po dlouhém přemýšlení nezná správnou odpověď a tak dá studentovi výbornou.\nIhned poté volá svému nejlepšímu studentovi a položí mu tu samou otázku.\nNejlepší student mu okamžitě odpoví: „Vám je 63 let a jste ženatý s 35-ti letou ženou, což je legální ale nelogické. Vaše žena má 25-ti letého milence, což je logické ale nelegální. Vy dáte tomu milenci své ženy za jedna ze zkoušky, přestože by měl vyletět; a to není ani logické ani legální.\nZ čehož se dá logicky vyvodit: Je legální, že sedíme v práci, ale nelogické, že při tom pracujeme. Je logické, že si posíláme soukromé e-maily, ale není to legální. A legální, natož pak logické není, že jsme za to ještě placeni.", punchline: "", tags: [] },
            { setup: "Profesor se špatně vyspal. Ptá se prvního studenta: „Jedete autobusem a je hrozné horko, co uděláte?“\n„Otevřu okno“\n„Dobře, a teď popište aerodynamické změny, které v autobuse nastanou.“ „?“\n„Děkuji, za pět, další!“ Druhý student stejná otázka, stejná odpověď, stejná známka. Za hodinu je stav zápasu profesor versus studenti 9 : 0. Jako desátá vchází pěkná studentka. Profesor se ptá……: „Jedete autobusem a je hrozné horko, co uděláte?“\n„Vysvleču si halenku.“\n„Vy mi nerozumíte, je opravdu horko.“\n„Tak si ještě vysvleču sukni.“\n„Je nesnesitelné horko“ stupňuje profesor.\n„Tak si vysvleču podprsenku.“ To profesorovi vyrazilo dech.", punchline: "Studentka dodává: „Ještě si můžu vysléct kalhotky, ale to okno neotevřu!“", tags: [] },
            { setup: "Student konzervatoře studoval skladbu. Blížily se mu závěrečné zkoušky\na on musel odevzdat své dílo. Jenže ho pořád nic kloudného nenapadalo.\nKamarád z vyššího ročníku mu poradil:\n„Vem skladbu svého profesora a přepiš ji pozpátku. Nikdo nic nepozná.“", punchline: "„Hm, to už jsem zkoušel a vyšla mi z toho Novosvětská.“", tags: [] },
            { setup: "Mladý potomek vévodského rodu se pokouší stát se námořním důstojníkem. Při jedné plavbě dostane za úkol vypočítat na širém oceáně polohu lodi. Když odevzdá svůj výpočet zkoušejícímu, obrátí se korvetní kapitán ke skupině aspirantů a řekne:\n„Smekněte, pánové!“\nVšichni hned uposlechnou, ale přece jen se dívají na kapitána tázavě. Ten jim svůj rozkaz vzápětí vysvětlí:", punchline: "„Podle výpočtů tohoto pána totiž právě proplouváme westminsterskou katedrálou.“", tags: ["úkol"] },
            { setup: "Paní učitelka má zapisovat od pondělí do pátku kdo chybí,potom příjde pan ředitel a řekne paní učitelce,aby mu přečetla příjmení kdo všechno chyběl.Paní učitelka spustí:Malý Zajíc Vyskočil, Velký Bobek Vytlačil.“", punchline: "", tags: ["lidi", "pták", "učitel", "učitelka", "zajíc", "ředitel", "škola"] },
            { setup: "Děti na prvním stupni mají vlastivědu a pani učitelka se zeptá?", punchline: "Děti povězte mi co všechno má nožičky. Děti se hlásí, jmenují zvířátka která mají nožičky a pak se přihlásí Pepíček a pronese: Srdíčko má nožičky. Učitelka se ho zeptá jak na to přišel a Pepík odpoví: Nedávno jsem šel v noci na záchod a slyším taťku jak říká: No tak srdíčko roztáhni už ty nožičky.", tags: ["pepíček", "učitel", "učitelka", "škola"] },
            { setup: "Učitel vykládá svým studentům o dobrých mravech a ptá se jednoho po druhém:\n„Tak Michaeli, kdybyste byl na schůzce s děvčetem a seděli byste v restauraci, jak byste jí řekl, že potřebujete na toaletu?”\n„No tak já bych jí řekl: Počkej, musím se jít vyčůrat.”\n„No, to by ale bylo velice nezdvořilé, řekl bych i hrubé, že? Co vy Honzo, co byste řekl vy?”\n„No, tak já bych řekl: Omlouvám se, ale opravdu musím na záchod.”\n„Tak to už je o hodně lepší, ale přece jen není vhodné používat slovo záchod u stolu, že? A co vy Petře, jak byste se zachoval vy?”\n„Řekl bych: Miláčku, prosím tě, můžeš mě na chvilku omluvit? Musím si jít potřást rukou se svým velice dobrým přítelem, se kterým se, jak doufám, po večeři seznámíš.”", punchline: "", tags: ["učitel", "škola"] },
            { setup: "„Jeníku, skloňuj slovo chléb.“ „Kdo, co?", punchline: "– Chléb.“ „S kým, s čím? – Se salámem.“ „Komu, čemu? – Mně.“", tags: ["škola"] },
            { setup: "„Mami, zejtra máme zkoušku ze zeměpisu.\n“ Můžeš mě vyzkoušet?“\n„To víš že jo.\n„Jaký je hlavní město Německa?“\n„Berlín.“\n„A jaký je hlavní město Francie?“\n„Berlín.“\n„A jaký je hlavní město Velký Británie?“\n„Berlín.“", punchline: "„Moc hezky ses to naučil, Adolfku.“", tags: ["zeměpis", "škola"] },
            { setup: "Paní učitelka na základní škole probírá s žáky občanskou výchovu a vysvětluje, co to jsou národnosti a co to znamená být Čechem.\nPoté žáky vyzve, ať zvednou ruce, jestli jsou také Češi.\nDěti, i když tomu příliš nerozumějí, všechny zvednou poslušně ruce.\nJen holčička v poslední řadě neudělá nic.\n„Copak je, Alenko, proč jsi nezvedla ruku?“ ptá se učitelka.\n„Protože nésu Češka,“ odpoví samozřejmě holčička.\n„A co tedy jsi?“\n„Su hrdá Moravanka.“\nUčitelka se zatváří nazlobeně, že jí někdo odporuje, a zeptá se:\n„Proč si o sobě myslíš, že jsi Moravanka a ne Češka.“\n„No moja maminka je Moravanka i můj tatínek je Moravan. Tak su i já Moravanka.“\nTo učitelku dopálí.\n„To přece není důvod! Co kdyby tvůj tatínek byl vůl a tvá maminka byla kráva, pak bys byla co?“\nHolčička se zamyslí a usměje se.", punchline: "„Potom bych byla Češka.“", tags: ["hádanka", "kráva", "maminka", "rodina", "tatínek", "učitel", "učitelka", "zima", "čeština", "škola", "žák"] },
