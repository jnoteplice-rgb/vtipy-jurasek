        // ========================================================
        // NORMALIZACE (odstraní diakritiku pro hledání)
        // ========================================================
        function normalizuj(text) {
            return text.toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .trim();
        }

        // ========================================================
        // HLEDÁNÍ
        // ========================================================
        const keywordInput = document.getElementById('keyword');
        const jokeCard = document.getElementById('jokeCard');
        const errorDiv = document.getElementById('error');
        const statsDiv = document.getElementById('stats');

        // Historie zobrazených ID (aby se vtipy neopakovaly hned po sobě)
        let historie = [];

        // Zobraz počet vtipů
        statsDiv.textContent = `📚 V databázi je ${VTIPY.length} vtipů`;

        keywordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') hledejVtip();
        });

        function rychleHledani(slovo) {
            keywordInput.value = slovo;
            hledejVtip();
        }

        const funEmojis = ['😂','🤣','😆','😹','🤪','😜','🥳','🎉','😎','🤩','🙃','😁'];

        function hledejVtip() {
            const keyword = keywordInput.value.trim();
            errorDiv.classList.remove('visible');

            let kandidati;
            if (!keyword) {
                // Náhodný vtip ze všech
                kandidati = VTIPY.map((v, i) => i);
            } else {
                const norm = normalizuj(keyword);
                kandidati = VTIPY
                    .map((v, i) => ({ v, i }))
                    .filter(({ v }) => {
                        // Hledáme v tagách, setup i punchline
                        if (v.tags.some(t => normalizuj(t).includes(norm) || norm.includes(normalizuj(t)))) return true;
                        if (normalizuj(v.setup).includes(norm)) return true;
                        if (normalizuj(v.punchline || '').includes(norm)) return true;
                        return false;
                    })
                    .map(({ i }) => i);
            }

            if (kandidati.length === 0) {
                showError(`😕 K slovu „${keyword}\" žádný vtip není. Zkus jiné slovo nebo klikni na 🎲 Náhodný!`);
                jokeCard.classList.remove('visible');
                return;
            }

            // Zkus vybrat takový, který nebyl nedávno
            let bezHistorie = kandidati.filter(i => !historie.includes(i));
            if (bezHistorie.length === 0) {
                historie = [];
                bezHistorie = kandidati;
            }

            const vybranyIdx = bezHistorie[Math.floor(Math.random() * bezHistorie.length)];
            historie.push(vybranyIdx);
            if (historie.length > Math.min(10, Math.floor(VTIPY.length / 2))) historie.shift();

            zobrazVtip(VTIPY[vybranyIdx], kandidati.length, keyword);
        }

        function zobrazVtip(vtip, pocet, keyword) {
            document.getElementById('jokeEmoji').textContent = funEmojis[Math.floor(Math.random() * funEmojis.length)];
            document.getElementById('jokeSetup').textContent = vtip.setup;
            document.getElementById('jokePunchline').textContent = vtip.punchline || '';

            let meta = '';
            if (keyword) {
                meta = `🔎 Pro „${keyword}\" nalezeno ${pocet} vtipů`;
            } else {
                meta = `🎲 Náhodný vtip z ${VTIPY.length}`;
            }
            document.getElementById('jokeMeta').textContent = meta;

            jokeCard.classList.remove('visible');
            // Force reflow for animation restart
            void jokeCard.offsetWidth;
            jokeCard.classList.add('visible');
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('visible');
        }

        // Při načtení ukaž náhodný vtip na uvítanou
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => hledejVtip(), 400);
        });
    </script>
