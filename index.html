<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤣 Vtipy pro Juráska! 🎉</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 520px; width: 100%; text-align: center; }

        h1 {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 8px;
            animation: bounceIn 0.8s ease;
        }

        .subtitle {
            color: rgba(255,255,255,0.95);
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        .input-section {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 26px 22px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 22px;
        }

        .input-label {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        .input-row { display: flex; gap: 10px; margin-bottom: 14px; }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1.05rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus { border-color: #764ba2; }

        .btn-search {
            padding: 14px 22px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-search:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5); }
        .btn-search:active { transform: scale(0.95); }

        .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

        .tag {
            padding: 8px 14px;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .tag:hover { transform: scale(1.1); }

        .joke-card {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        .joke-card.visible { display: block; }

        .joke-emoji {
            font-size: 3rem;
            margin-bottom: 14px;
            animation: wiggle 1s ease infinite;
        }

        .joke-text {
            font-size: 1.15rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 8px;
            white-space: pre-line;
        }

        .joke-punchline {
            font-size: 1.25rem;
            color: #f5576c;
            font-weight: bold;
            margin-top: 10px;
            white-space: pre-line;
        }

        .joke-meta {
            font-size: 0.8rem;
            color: #999;
            margin-top: 14px;
        }

        .btn-another {
            margin-top: 14px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-another:hover { transform: scale(1.05); }

        .error-msg {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 18px;
            color: #e74c3c;
            display: none;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .error-msg.visible { display: block; }

        .floating-emoji {
            position: fixed;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            opacity: 0.5;
            pointer-events: none;
        }

        .stats {
            color: rgba(255,255,255,0.85);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <div class="floating-emoji" style="top:10%; left:5%;">😂</div>
    <div class="floating-emoji" style="top:30%; right:8%; animation-delay:-2s;">🤪</div>
    <div class="floating-emoji" style="top:60%; left:3%; animation-delay:-4s;">😜</div>
    <div class="floating-emoji" style="bottom:15%; right:5%; animation-delay:-1s;">🎉</div>

    <div class="container">
        <h1>🤣 Vtipy pro Juráska!</h1>
        <p class="subtitle">Napiš slovo a najdi k němu vtip 🎯</p>

        <div class="input-section">
            <label class="input-label">🔍 Co tě zajímá?</label>
            <div class="input-row">
                <input type="text" id="keyword" placeholder="např. škola, pes, fotbal..." autocomplete="off" autofocus>
                <button class="btn-search" onclick="hledejVtip()" title="Hledat vtip">🚀</button>
            </div>
            <div class="quick-tags">
                <button class="tag" onclick="rychleHledani('škola')">🏫 Škola</button>
                <button class="tag" onclick="rychleHledani('Pepíček')">👦 Pepíček</button>
                <button class="tag" onclick="rychleHledani('Hurvínek')">🎭 Hurvínek</button>
                <button class="tag" onclick="rychleHledani('Chuck')">🥋 Chuck Norris</button>
                <button class="tag" onclick="rychleHledani('pes')">🐕 Pes</button>
                <button class="tag" onclick="rychleHledani('fotbal')">⚽ Fotbal</button>
                <button class="tag" onclick="rychleHledani('zvíře')">🦁 Zvířata</button>
                <button class="tag" onclick="rychleHledani('doktor')">💊 Doktor</button>
                <button class="tag" onclick="rychleHledani('počítač')">💻 Počítač</button>
                <button class="tag" onclick="rychleHledani('jídlo')">🍕 Jídlo</button>
                <button class="tag" onclick="rychleHledani('hádanka')">🎯 Hádanky</button>
                <button class="tag" onclick="rychleHledani('')">🎲 Náhodný</button>
            </div>
            <p class="stats" id="stats"></p>
        </div>

        <div class="error-msg" id="error"></div>

        <div class="joke-card" id="jokeCard">
            <div class="joke-emoji" id="jokeEmoji">😂</div>
            <div class="joke-text" id="jokeSetup"></div>
            <div class="joke-punchline" id="jokePunchline"></div>
            <div class="joke-meta" id="jokeMeta"></div>
            <button class="btn-another" onclick="hledejVtip()">🔄 Další vtip!</button>
        </div>
    </div>

    <script>
        // ========================================================
        // DATABÁZE KLASICKÝCH ČESKÝCH VTIPŮ PRO DĚTI
        // ========================================================
        // Každý vtip má: setup, punchline (může být prázdná pro jednovětné),
        // a tags (klíčová slova pro vyhledávání)
        const VTIPY = [
            // === PEPÍČEK / ŠKOLA ===
            { setup: "Paní učitelka se ptá Pepíčka:\n„Pepíčku, vyjmenuj čtyři domácí zvířata.\"", punchline: "„Pes, kočka a dva králíci.\"", tags: ["pepíček","škola","učitelka","zvířata","pes","kočka","králík"] },
            { setup: "„Pepíčku, kdybys měl tři jablka a dal Tomovi dvě, co bys měl?\"", punchline: "„No přece jedno!\"", tags: ["pepíček","škola","matematika","jablko"] },
            { setup: "Paní učitelka: „Pepíčku, co je to idiom?\"\nPepíček: „To nevím, paní učitelko.\"\n„No přece ustálené slovní spojení, vyjmenuj nějaké.\"", punchline: "Pepíček: „Paní učitelko, jdi do háje!\"", tags: ["pepíček","škola","učitelka","čeština"] },
            { setup: "„Pepíčku, proč jsi dneska přišel pozdě?\"", punchline: "„Protože cedule u silnice říkala: Škola – zpomal!\"", tags: ["pepíček","škola","cesta"] },
            { setup: "Tatínek: „Pepíčku, co jste dneska měli ve škole?\"\n„Matematiku.\"\n„A co jste se naučili?\"\n„Že dvě a dvě je pět.\"\n„Ale Pepíčku, to je blbost! Zítra se to naučíš správně.\"", punchline: "„Ale táto, zítra máme češtinu!\"", tags: ["pepíček","škola","matematika","tatínek","táta"] },
            { setup: "Pepíček tatínkovi: „Tati, dostal jsem dneska ve škole jedničku!\"\n„No výborně, a z čeho?\"", punchline: "„Z nosu, paní učitelka má dobrou mušku.\"", tags: ["pepíček","škola","jednička","tatínek","táta","nos"] },
            { setup: "Paní učitelka: „Pepíčku, vyjmenuj pět afrických zvířat.\"", punchline: "„Dva lvi a tři žirafy.\"", tags: ["pepíček","škola","učitelka","zvíře","afrika","lev","žirafa"] },
            { setup: "„Pepíčku, kolik je pět minus pět?\"\nPepíček mlčí.\n„No tak, Pepíčku, kolik to je?\"", punchline: "„Paní učitelko, já nevím. Když tam nic není, jak to mám spočítat?\"", tags: ["pepíček","škola","matematika","učitelka"] },
            { setup: "Pepíček přijde domů a povídá:\n„Tati, prospěl jsem za pololetí!\"\n„No to je skvělé! V čem?\"", punchline: "„V angličtině. Akorát mě poslali do druhé třídy.\"", tags: ["pepíček","škola","angličtina","tatínek","táta","vysvědčení"] },
            { setup: "„Pepíčku, proč máš v diáři tolik poznámek?\"", punchline: "„Protože mám hodně kamarádů, paní učitelko!\"", tags: ["pepíček","škola","poznámka","učitelka"] },
            { setup: "Pepíček tatínkovi: „Tati, pomůžeš mi s úkolem?\"\n„Ne, Pepíčku, to by nebylo správné.\"", punchline: "„Tak aspoň to zkus, táto!\"", tags: ["pepíček","škola","úkol","tatínek","táta"] },
            { setup: "Paní učitelka: „Co se stalo v roce 1492?\"\nPepíček: „Kolumbus objevil Ameriku.\"\n„Správně. A co v roce 1493?\"", punchline: "„Kolumbus objevil Ameriku podruhé.\"", tags: ["pepíček","škola","dějepis","historie","kolumbus"] },
            { setup: "„Pepíčku, jak se píše přechodník?\"", punchline: "„Já ho nepíšu, já ho přecházím.\"", tags: ["pepíček","škola","čeština"] },
            { setup: "Paní učitelka: „Kdo mi řekne, co je to polopustina?\"\nPepíček zvedne ruku: „To je, když je lednička napůl prázdná!\"", punchline: "", tags: ["pepíček","škola","učitelka","zeměpis","lednička"] },

            // === ZVÍŘATA ===
            { setup: "Co řekne kráva ráno, když vstane?", punchline: "Búúú-dobré ráno!", tags: ["zvíře","kráva","ráno"] },
            { setup: "Proč mají sloni velké uši?", punchline: "Protože malé by jim nestačily!", tags: ["zvíře","slon"] },
            { setup: "Co dělá včela, když ji bolí bříško?", punchline: "Bzučí na záchod!", tags: ["zvíře","včela"] },
            { setup: "Jaký je rozdíl mezi slonem a komárem?", punchline: "Slon může mít komáry, ale komár slony ne.", tags: ["zvíře","slon","komár"] },
            { setup: "Co dělá kočka v knihovně?", punchline: "Hledá myš... na počítači.", tags: ["zvíře","kočka","knihovna","počítač","myš"] },
            { setup: "Přijde pes k veterináři a říká:\n„Pane doktore, já nemůžu štěkat.\"", punchline: "Veterinář: „No to jste mě teda překvapil.\"", tags: ["zvíře","pes","veterinář","doktor"] },
            { setup: "Proč kohout ráno kokrhá?", punchline: "Protože slepice neumí pískat.", tags: ["zvíře","kohout","slepice","ráno"] },
            { setup: "Co je to žirafa?", punchline: "Kůň, kterému dorostl krk až do nebe.", tags: ["zvíře","žirafa","kůň"] },
            { setup: "Potkají se dva červíci v jablku.\n„Čau, co tady děláš?\"", punchline: "„Promiň, spletl jsem si adresu.\"", tags: ["zvíře","červ","jablko"] },
            { setup: "Co dělá ryba, když nemůže spát?", punchline: "Počítá vlny.", tags: ["zvíře","ryba","spánek"] },
            { setup: "Proč ptáci letí na jih?", punchline: "Protože pěšky by to bylo moc daleko.", tags: ["zvíře","pták","jih"] },
            { setup: "Jak se řekne slon, který se moc nají?", punchline: "Obslon.", tags: ["zvíře","slon","jídlo"] },
            { setup: "Co je to žralok v obleku?", punchline: "Advokát.", tags: ["zvíře","žralok","advokát"] },

            // === FOTBAL / SPORT ===
            { setup: "Proč fotbalista nosí do školy učebnici matematiky?", punchline: "Aby uměl počítat góly!", tags: ["fotbal","sport","škola","matematika","gól"] },
            { setup: "Dva fotbalisté se baví před zápasem:\n„Věříš na život po smrti?\"\n„Věřím.\"", punchline: "„Ty jo, to je skvělý! Včera jsi říkal, že nepřijdeš na trénink, protože máš pohřeb dědy, a dneska tě tam viděli!\"", tags: ["fotbal","sport","trénink"] },
            { setup: "Přijde fotbalista do školy a ptá se učitele:\n„Pane učiteli, bude se dávat pětka za něco, co člověk neudělal?\"\n„No to samozřejmě ne!\"", punchline: "„Tak to je dobře, protože jsem neudělal domácí úkol.\"", tags: ["fotbal","sport","škola","učitel","úkol"] },
            { setup: "Proč chodí brankář vždy poslední z hřiště?", punchline: "Protože musí posbírat všechny góly, co dostal.", tags: ["fotbal","sport","brankář","gól"] },
            { setup: "Co řekne trenér hráči, který dal vlastní gól?", punchline: "„Aspoň víme, že umíš střílet!\"", tags: ["fotbal","sport","trenér","gól"] },
            { setup: "Co má fotbalista a pytel cementu společného?", punchline: "Oba se ztvrdnou na hřišti.", tags: ["fotbal","sport","hřiště"] },
            { setup: "Jaký je nejhorší sport pro lenochoda?", punchline: "Rychlobruslení.", tags: ["sport","lenochod","rychlobruslení"] },

            // === POČÍTAČE / TECHNIKA ===
            { setup: "Proč programátor vždycky nosí brýle?", punchline: "Protože nevidí C# (céčko)!", tags: ["počítač","programátor","brýle"] },
            { setup: "Jak pozná programátor, že je na WC?", punchline: "Má před sebou okno a nic nefunguje.", tags: ["počítač","programátor","wc","okno"] },
            { setup: "Kolik programátorů je potřeba k výměně žárovky?", punchline: "Žádný. To je hardwarový problém.", tags: ["počítač","programátor","žárovka","hardware"] },
            { setup: "Proč se počítače nikdy nenastydnou?", punchline: "Protože mají dobrý Windows (okna).", tags: ["počítač","windows","okno"] },
            { setup: "Potkají se dva počítače:\n„Jak se máš?\"", punchline: "„Ujde to, akorát mám virózu.\"", tags: ["počítač","virus","nemoc"] },
            { setup: "Co dělá myš, když se rozbije klávesnice?", punchline: "Zavolá krysu.", tags: ["počítač","myš","klávesnice","krysa"] },

            // === JÍDLO ===

            { setup: "Synek se ptá táty:\n„Tati, proč má žirafa tak dlouhý krk?\"\nTáta: „Protože jí smrdí nohy.\"", punchline: "Synek: „Aha, jako strejda.\"", tags: ["rodina","tatínek","táta","žirafa","strejda"] },

            // === VŠEOBECNÉ / ABSURD ===
            { setup: "Proč duchové nelžou?", punchline: "Protože je skrz ně všechno vidět.", tags: ["duch","strašidlo"] },
            { setup: "Proč kostlivec nešel na párty?", punchline: "Neměl s kým, všechny jeho kamarády snědl pes.", tags: ["kostlivec","párty","pes"] },
            { setup: "Co dělá sněhulák na dovolené?", punchline: "Taje si tam dobře.", tags: ["sněhulák","dovolená","zima"] },
            { setup: "Jak se řekne lenochod anglicky?", punchline: "Slowly...", tags: ["lenochod","angličtina"] },
            { setup: "Proč pirát nechodí do banky?", punchline: "Protože má vlastní „Arr-count\".", tags: ["pirát","banka","angličtina"] },
            { setup: "Co si řekne dvě nuly, když se potkají?", punchline: "„Ahoj, ale osmičko!\"", tags: ["číslo","nula","matematika"] },
            { setup: "Proč rybář nikdy nelže?", punchline: "Protože by se mu prodloužily ryby.", tags: ["rybář","ryba","lež"] },
            { setup: "Co řekne jedna zeď druhé?", punchline: "„Sejdeme se na rohu!\"", tags: ["zeď","roh"] },
            { setup: "Proč banán chodil k doktorovi?", punchline: "Protože se mu loupala kůra.", tags: ["jídlo","banán","doktor"] },

            // === PEPÍČEK (pokračování) ===
            { setup: "Paní učitelka: „Pepíčku, řekni větu se slovem 'byl'.\"", punchline: "„Paní učitelko, dnes to jen tak nebyl.\"", tags: ["pepíček","škola","čeština","učitelka"] },
            { setup: "„Pepíčku, proč jsi měl včera ve škole dvě jedničky?\"", punchline: "„Jedna byla z chování.\"", tags: ["pepíček","škola","jednička"] },
            { setup: "„Pepíčku, víš, co je to osobní zájmeno?\"", punchline: "„Jo, to je, když mě babička vezme na zmrzlinu.\"", tags: ["pepíček","škola","čeština","babička","zmrzlina"] },
            { setup: "„Pepíčku, kdybys měl 10 korun a utratil 5, co bys měl?\"", punchline: "„Dluh!\"", tags: ["pepíček","škola","matematika","peníze"] },
            { setup: "„Pepíčku, vyjmenuj mi řeky, které znáš.\"\nPepíček: „Ř, Ř, Ř...\"\n„Pepíčku, řeku, ne písmeno!\"", punchline: "„Aha, paní učitelko... Labe, Vltava, Morava, Oregon...\"", tags: ["pepíček","škola","zeměpis","řeka"] },
            { setup: "Tatínek: „Pepíčku, co budeš dělat, až budeš velký?\"", punchline: "„Velký jídlo.\"", tags: ["pepíček","tatínek","táta","jídlo"] },
            { setup: "„Pepíčku, jak se jmenuje tvůj pes?\"\n„Pepíček.\"\n„Stejně jako ty?\"", punchline: "„Jo, protože když mamka křikne 'Pepíčku, pojď sem!', přijdeme oba.\"", tags: ["pepíček","pes","maminka"] },
            { setup: "Paní učitelka: „Pepíčku, doplň: Běžím jako...\"", punchline: "„...když mi maminka řekne, ať jdu vynést koš.\"", tags: ["pepíček","škola","maminka","koš"] },
            { setup: "„Pepíčku, co jsi dělal o prázdninách?\"\n„Nic, paní učitelko.\"\n„A co jsi si zapsal?\"", punchline: "„Ze všech sil.\"", tags: ["pepíček","škola","prázdniny","učitelka"] },
            { setup: "Pepíček přijde ze školy: „Mami, dneska jsem byl jediný, kdo uměl odpovědět!\"\n„A na co se paní učitelka ptala?\"", punchline: "„Kdo rozbil okno.\"", tags: ["pepíček","škola","maminka","okno"] },
            { setup: "„Pepíčku, proč máš rád zimu?\"\n„Protože nemusím do školy.\"\n„Ale v zimě přece škola je!\"", punchline: "„Já vím, ale mě omlouvá nemoc.\"", tags: ["pepíček","škola","zima","nemoc"] },
            { setup: "„Pepíčku, jak se řekne anglicky 'nic'?\"\n„Nothing.\"\n„Správně! A česky?\"", punchline: "„Prázdniny.\"", tags: ["pepíček","škola","angličtina","prázdniny"] },
            { setup: "Paní učitelka: „Pepíčku, napiš na tabuli slovo 'diktafon'.\"\nPepíček napíše.\n„Máš tam chybu.\"", punchline: "„Ale paní učitelko, vy jste mi to nadiktovala!\"", tags: ["pepíček","škola","čeština","tabule"] },
            { setup: "„Pepíčku, co víš o rovníku?\"\n„Je to imaginární čára okolo Země.\"\n„A co ještě?\"", punchline: "„A nedá se na něj přivázat prádlo.\"", tags: ["pepíček","škola","zeměpis","rovník"] },
            { setup: "„Pepíčku, kolik je tvůj otec starý?\"\n„Tolik, kolik já.\"\n„Jak to?\"", punchline: "„Stal se tátou, když jsem se narodil.\"", tags: ["pepíček","tatínek","táta","věk"] },
            { setup: "Paní učitelka: „Pepíčku, kolik je dvě plus dvě?\"\n„Přibližně čtyři.\"\n„Přibližně? Pepíčku, to je přesně čtyři!\"", punchline: "„Tak proč se mě ptáte, když to víte?\"", tags: ["pepíček","škola","matematika"] },
            { setup: "„Pepíčku, kdo ti pomáhal s domácím úkolem?\"", punchline: "„Nikdo, paní učitelko. Udělal jsem ho sám, přestože táta chtěl pomoct.\"", tags: ["pepíček","škola","úkol","tatínek","táta"] },
            { setup: "Paní učitelka: „Pepíčku, jak se jmenuje manželka vola?\"\nPepíček: „Vůlice.\"\n„To ne, kráva.\"", punchline: "„Aha, a to je manžel, nebo manželka?\"", tags: ["pepíček","škola","zvíře","kráva"] },
            { setup: "„Pepíčku, proč jsi utíkal ze školy?\"", punchline: "„Protože mi paní učitelka řekla, že mám opakovat.\"", tags: ["pepíček","škola","útěk"] },
            { setup: "Tatínek Pepíčkovi: „Nemaluj na zeď, Pepíčku!\"", punchline: "„Tak mi koupíš jinou?\"", tags: ["pepíček","tatínek","táta","zeď","malování"] },
            { setup: "„Pepíčku, proč jsi dnes ráno zkontroloval teploměr?\"", punchline: "„Abych věděl, jestli se mi vyplatí jít do školy.\"", tags: ["pepíček","škola","teploměr","nemoc"] },
            { setup: "Paní učitelka: „Pepíčku, kolik je pět minus pět?\"\nPepíček mlčí.\n„No tak, kolik to je?\"", punchline: "„Paní učitelko, já nevím. Když tam nic není, jak to mám spočítat?\"", tags: ["pepíček","škola","matematika"] },
            { setup: "„Pepíčku, máš ve slohu tolik chyb, kolik hlav má drak.\"\n„A kolik hlav má drak?\"", punchline: "„V tvé slohovce tři.\"", tags: ["pepíček","škola","sloh","drak"] },
            { setup: "Paní učitelka: „Pepíčku, jestli máš jedno jablko a dám ti další dvě, kolik budeš mít jablek?\"", punchline: "„Tři, ale nechci tři, chci hrušku.\"", tags: ["pepíček","škola","matematika","jablko","hruška"] },
            { setup: "„Pepíčku, co víš o Karlu IV.?\"\n„Umřel.\"\n„A co víš o Rudolfu II.?\"\n„Taky umřel.\"\n„A o Václavu IV.?\"", punchline: "„Ten ještě přijde.\"", tags: ["pepíček","škola","dějepis","historie"] },

            // === ŠKOLA (pokračování) ===
            { setup: "„Žáci, napište slohovou práci na téma Moje rodina.\"\nŽák: „A můžu napsat jen o sobě?\"\n„Proč?\"", punchline: "„Ostatní mi lezou na nervy.\"", tags: ["škola","sloh","rodina"] },
            { setup: "Učitel tělocviku: „Proč se nehýbeš?\"", punchline: "„Pane učiteli, spořím energii.\"", tags: ["škola","tělocvik","učitel"] },
            { setup: "Paní učitelka: „Kdo mi ukáže Česko na mapě?\"\nHonzík ukáže.\n„Výborně. A kdo řekne, jak se jmenuje hlavní město?\"", punchline: "Třída: „Honzík!\"", tags: ["škola","zeměpis","praha"] },
            { setup: "Ředitel: „Proč máš v žákovské tolik poznámek?\"", punchline: "„Protože jsem pilný, pane řediteli!\"", tags: ["škola","ředitel","poznámka","žákovská"] },
            { setup: "„Maruško, proč jsi zas přišla pozdě?\"", punchline: "„Paní učitelko, na chodbě bylo napsáno 'Pozor, malováno!' a já jsem se zastavila.\"", tags: ["škola","učitelka","pozdě"] },
            { setup: "„Které je tvůj nejoblíbenější předmět ve škole?\"", punchline: "„Přestávka.\"", tags: ["škola","předmět","přestávka"] },
            { setup: "„Která kniha je nejvíc strašidelná?\"", punchline: "„Učebnice matematiky.\"", tags: ["škola","kniha","matematika"] },
            { setup: "„Proč chodíš do školy?\"", punchline: "„Protože domů bych nedošel.\"", tags: ["škola","cesta"] },
            { setup: "Žák v testu. Otázka: Co víš o zemské přitažlivosti?", punchline: "Odpověď: „Díky ní padám jenom dolů, ne taky vzhůru.\"", tags: ["škola","test","fyzika","gravitace"] },
            { setup: "Chemikář: „Jak se nazývá látka H2O?\"\nŽák: „Voda.\"\n„A CO2?\"\n„Oxid uhličitý.\"\n„A K2R?\"", punchline: "„Kadeřník?\"", tags: ["škola","chemie","voda","kadeřník"] },
            { setup: "Paní učitelka rodičům: „Váš Jirka má velmi bohatou fantazii.\"\nTatínek: „A kvůli čemu?\"", punchline: "„Napsal slohovku s názvem 'Můj pes'. Ale vy přece nemáte psa.\"", tags: ["škola","sloh","pes","rodiče"] },
            { setup: "Žákyně u tabule: „Paní učitelko, nevím.\"\nUčitelka: „Tak si představ, že je to test.\"", punchline: "„V tom případě vím, akorát bych si chtěla opsat od sousedky.\"", tags: ["škola","test","tabule","učitelka"] },
            { setup: "Paní učitelka: „Za co jsi dostal dvojku?\"\nŽák: „Za chování.\"\n„A co jsi udělal?\"", punchline: "„Nic. A to bylo právě špatně, měl jsem dávat pozor.\"", tags: ["škola","chování","dvojka"] },
            { setup: "Učitel matematiky: „Jeden pracovník vykope jámu za 4 hodiny. Za kolik ji vykopou dva?\"\nŽák: „Za 2 hodiny.\"\n„A deset?\"", punchline: "„Jáma už bude vykopaná, tak nikdy.\"", tags: ["škola","matematika","učitel"] },
            { setup: "Žák paní učitelce: „Musím si jít odskočit.\"\n„Nemůžeš počkat do přestávky?\"", punchline: "„Ne, paní učitelko, moje tělo nemá rozvrh hodin.\"", tags: ["škola","učitelka","přestávka"] },
            { setup: "„Proč se díváš do žákovské, jestli máš poznámku?\"", punchline: "„Abych věděl, jak se doma tvářit.\"", tags: ["škola","žákovská","poznámka"] },
            { setup: "Paní učitelka: „Kdo mi poví, co je to zázrak?\"\nŽák: „Když dostanu z matiky jedničku.\"", punchline: "Učitelka: „Nikoliv, to je spíš sen.\"", tags: ["škola","matematika","zázrak","jednička"] },
            { setup: "Žáček tatínkovi: „Tati, ve škole nás učili o antice.\"\n„A co jsi se naučil?\"", punchline: "„Že už je to dávno, tak si to mamka už nepamatuje.\"", tags: ["škola","dějepis","antika","tatínek"] },
            { setup: "Učitel: „Dnes si napíšeme diktát.\"\nŽák: „A zítra?\"", punchline: "„Zítra si ho opravíme.\"", tags: ["škola","diktát","čeština"] },
            { setup: "„Pane učiteli, proč máte žákovskou mrtvolu?\"\n„Vy naschvál nechcete vyslovit 'elektřina'?\"", punchline: "„Promiňte, já jsem myslel ten plyšový kostlivec v rohu.\"", tags: ["škola","učitel","fyzika"] },

            // === ZVÍŘATA (pokračování) ===
            { setup: "Přijde kočka do obchodu: „Prosím myš.\"\n„Živou, nebo mrtvou?\"", punchline: "„To je fuk, stejně si ji zabiju.\"", tags: ["zvíře","kočka","myš","obchod"] },
            { setup: "Proč slon nehraje fotbal?", punchline: "Protože má moc velké míče u nohou.", tags: ["zvíře","slon","fotbal","sport"] },
            { setup: "Co dělá kapr o Vánocích?", punchline: "Plave ve vaně a čeká.", tags: ["zvíře","ryba","kapr","vánoce"] },
            { setup: "Co je to? Černé, bílé, červené?", punchline: "Zebra, která se uhodila.", tags: ["zvíře","zebra","hádanka"] },
            { setup: "Co dělá koza na střeše?", punchline: "Drží se, aby nespadla.", tags: ["zvíře","koza","střecha"] },
            { setup: "Proč jsou kraby neochotní?", punchline: "Protože chodí pořád stranou.", tags: ["zvíře","krab"] },
            { setup: "Co řekne ryba, když narazí do zdi?", punchline: "„Dam!\"", tags: ["zvíře","ryba","zeď"] },
            { setup: "Co dělá pavouk na internetu?", punchline: "Lovuje chyby.", tags: ["zvíře","pavouk","internet","počítač"] },
            { setup: "Dva šneci na silnici: „Pospěš, za chvíli pojede auto!\"", punchline: "„Pospíchám, už 20 minut!\"", tags: ["zvíře","šnek","auto","silnice"] },
            { setup: "Co dělá medvěd v zimě?", punchline: "Sní o medu.", tags: ["zvíře","medvěd","zima","med"] },
            { setup: "Jaký je rozdíl mezi kobylkou a kobylou?", punchline: "Velikost. A kobylka má křídla.", tags: ["zvíře","kobylka","kůň"] },
            { setup: "Přijde kohout do baru: „Jedno pivo.\"\nBarman: „Vás neobsloužím.\"\n„Proč?\"", punchline: "„Protože brzo ráno pořád kokrháte a hosté si stěžují.\"", tags: ["zvíře","kohout","bar"] },
            { setup: "Co dělá králík v knihovně?", punchline: "Čte knížku o králi.", tags: ["zvíře","králík","knihovna"] },
            { setup: "Proč žáby nepijí kafe?", punchline: "Protože jim z toho skáčou tepny.", tags: ["zvíře","žába","káva"] },
            { setup: "Co dělá ježek v prádelně?", punchline: "Čistí si bodliny.", tags: ["zvíře","ježek","prádelna"] },
            { setup: "Jak nazveš rybu bez očí?", punchline: "Ryba... psssst... nic.", tags: ["zvíře","ryba"] },
            { setup: "Proč ptáci letí na jih na zimu?", punchline: "Protože pěšky by to bylo moc daleko.", tags: ["zvíře","pták","zima","jih"] },
            { setup: "Co dělá myš, když vidí slona?", punchline: "Utíká. A slon taky — před pavoukem.", tags: ["zvíře","myš","slon","pavouk"] },
            { setup: "Potkají se dvě kočky: „Haf!\"\n„Ty ses zbláznila?!\"", punchline: "„Musím se učit cizí jazyky.\"", tags: ["zvíře","kočka","pes","jazyk"] },
            { setup: "Proč medvěd nemá wifi?", punchline: "Protože je v lese, kde má slabý signál.", tags: ["zvíře","medvěd","wifi","internet","les"] },
            { setup: "Co udělá pes, když mu ukradnou kost?", punchline: "Začne si stěžovat, ale nikdo mu nerozumí.", tags: ["zvíře","pes","kost"] },
            { setup: "Jak se pozná sova bez peří?", punchline: "Podle pohrdavého pohledu.", tags: ["zvíře","sova"] },
            { setup: "Proč kocour nosí kravatu?", punchline: "Protože jde na myší pohřeb.", tags: ["zvíře","kocour","myš","kravata"] },
            { setup: "Co dělá tučňák v teplém oblečení?", punchline: "Mučí se.", tags: ["zvíře","tučňák","oblečení"] },
            { setup: "Proč jsou velbloudi vytrvalí?", punchline: "Protože nesou na hřbetě celou zásobu pití.", tags: ["zvíře","velbloud","poušť"] },

            // === FOTBAL / SPORT (pokračování) ===
            { setup: "Proč fotbalisté mají špatnou paměť?", punchline: "Protože pořád jenom hlavičkují.", tags: ["fotbal","sport","hlavička"] },
            { setup: "Trenér hráči: „Proč jsi nedal penaltu?\"", punchline: "„Brankář mi fandil, nechtěl jsem ho zklamat.\"", tags: ["fotbal","sport","trenér","penalta","brankář"] },
            { setup: "„Jaký sport ovládáš?\"\n„Extrémní.\"\n„Jaký přesně?\"", punchline: "„Vstávání v pondělí ráno.\"", tags: ["sport","pondělí","vstávání"] },
            { setup: "Jak se pozná špatný brankář?", punchline: "Z jeho strany sítě je vždycky víc gólů než z druhé.", tags: ["fotbal","sport","brankář","gól"] },
            { setup: "Dva fotbalisté: „Co dělá tvůj trenér?\"\n„Spí.\"\n„A v práci?\"", punchline: "„Taky spí, ale má u toho otevřené oči.\"", tags: ["fotbal","sport","trenér","spánek"] },
            { setup: "„Co dělá fotbalista, když prohraje?\"", punchline: "„Vysvětluje to své mamce.\"", tags: ["fotbal","sport","prohra","maminka"] },
            { setup: "Proč brankáři neumějí matematiku?", punchline: "Protože pokaždé, když mají spočítat góly, zapomínají ty svoje.", tags: ["fotbal","sport","brankář","matematika"] },
            { setup: "Učitel tělocviku: „Proč sis nevzal trenky?\"", punchline: "„Pane učiteli, cvičíme tak málo, že nemá cenu se převlékat.\"", tags: ["sport","tělocvik","trenky","učitel"] },
            { setup: "Jaký je nejlepší sport pro líné lidi?", punchline: "Šachy. Stačí chytit koně za hřívu.", tags: ["sport","šachy","líný"] },
            { setup: "Fanoušek volá na hráče: „Nemáš tam nohu!\"\nHráč: „Mám, já ji jenom neumím použít!\"", punchline: "", tags: ["fotbal","sport","fanoušek"] },

            // === POČÍTAČE / TECHNIKA (pokračování) ===
            { setup: "Jak zjistíš, že je počítač starý?", punchline: "Má myš, která chodí jenom na čtyřech nohách.", tags: ["počítač","myš","stáří"] },
            { setup: "Co dělá programátor v lese?", punchline: "Hledá Wi-Fi.", tags: ["počítač","programátor","les","wifi"] },
            { setup: "Proč programátoři spletou Vánoce s Halloweenem?", punchline: "Protože OCT 31 = DEC 25 (v různých soustavách).", tags: ["počítač","programátor","vánoce","halloween"] },
            { setup: "Co řekne počítač, když je smutný?", punchline: "„Jsem offline. Prosím, nerestartujte mě.\"", tags: ["počítač","smutek"] },
            { setup: "Co je to: má to spoustu oken, ale nikdy neprší uvnitř?", punchline: "Windows.", tags: ["počítač","windows","okno","hádanka"] },
            { setup: "Potkají se dvě myši u klávesnice: „Neviděla jsi mého bratra?\"", punchline: "„Ne, ale viděla jsem CTRL.\"", tags: ["počítač","myš","klávesnice"] },
            { setup: "Programátor říká manželce: „Zaběhnu do obchodu, co chceš?\"\n„Chleba, a když budou vajíčka, kup 6.\"\nVrátí se se 6 chleby.\n„Proč 6?\"", punchline: "„Byla vajíčka.\"", tags: ["počítač","programátor","chleba","vajíčka"] },
            { setup: "Jak programátor pozná, že je ráno?", punchline: "Monitor bliká, kafe nedělá.", tags: ["počítač","programátor","ráno","káva"] },
            { setup: "Proč mají počítače rády studené počasí?", punchline: "Protože se nepřehřejou.", tags: ["počítač","zima"] },
            { setup: "Co dělá hacker o prázdninách?", punchline: "Hackuje počasí – pořád mu svítí slunce.", tags: ["počítač","hacker","prázdniny","slunce"] },

            // === JÍDLO (pokračování) ===
            { setup: "Co řekne sýr mléku?", punchline: "„Ty mě zrálo, já ti to nezapomenu!\"", tags: ["jídlo","sýr","mléko"] },
            { setup: "Proč okurka smrdí?", punchline: "Protože se kamarádí jen se zelím.", tags: ["jídlo","okurka","zelí"] },
            { setup: "Co řekne pizza jiné pizze v troubě?", punchline: "„Ale jsi dnes horká!\"", tags: ["jídlo","pizza","trouba"] },
            { setup: "Co dělá hruška na hodině matematiky?", punchline: "Počítá si seménka.", tags: ["jídlo","hruška","matematika","škola"] },
            { setup: "Potkají se dvě vejce v koši: „Víš, co je to omeleta?\"", punchline: "„Nevím, ale radši bych na to nechtěl přijít.\"", tags: ["jídlo","vejce","omeleta"] },
            { setup: "Co dělá káva v posteli?", punchline: "Probouzí se.", tags: ["jídlo","káva","postel"] },

            // === RODINA (pokračování) ===

            { setup: "Táta synovi: „Když jsem byl v tvém věku, chodil jsem 5 km do školy pěšky.\"", punchline: "Syn: „Ale tati, dneska máme auta. Tak to trénuješ na důchod?\"", tags: ["rodina","tatínek","škola","auto"] },

            { setup: "Táta synovi: „Až vyrosteš, budeš chtít být jako já.\"", punchline: "„Ne, tati, já chci být šťastný.\"", tags: ["rodina","tatínek","syn"] },
            { setup: "Sestra bratrovi: „Proč se nikdy nesmíváš?\"\n„Ty se nesmíváš.\"\n„Ale já jsem se dneska smála dvakrát!\"", punchline: "„Kdy?\"\n„Když jsi spadl. A když ses neuměl zvednout.\"", tags: ["rodina","sestra","bratr"] },
            { setup: "Maminka Anetce: „Proč jsi tak špinavá?\"\n„Byla jsem v bahně.\"\n„A proč v bahně?\"", punchline: "„Protože jsi mi zakázala jít na ulici.\"", tags: ["rodina","maminka","bahno","ulice"] },
            { setup: "Táta: „Synu, když uklidíš pokoj, dostaneš kapesné.\"\nSyn: „A když ho neuklidím?\"", punchline: "„Nedostaneš nic.\"\n„Tak to vyjde skoro nastejno.\"", tags: ["rodina","tatínek","pokoj","kapesné"] },
            { setup: "Malý Honzík mamince: „Mami, můžu si pustit televizi?\"\n„Když uděláš úkoly.\"", punchline: "„Tak raději televizi nezapnu, úkoly jsou delší.\"", tags: ["rodina","maminka","televize","úkol"] },

            // === DOKTOR (pokračování) ===

            { setup: "Zubař pacientovi: „Neboj, bude to rychlé.\"", punchline: "„Ale pane doktore, vy jste mi odskočil k paláci Vězně!\"", tags: ["doktor","zubař","zub"] },
            { setup: "„Pane doktore, mám nohu kratší!\"\n„Obě?\"\n„Ne, jen jednu!\"", punchline: "„Tak se odskočte, druhá to vyrovná.\"", tags: ["doktor","noha"] },
